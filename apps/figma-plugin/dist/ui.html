      async function loadConfig() {
        if (isLoadingConfig) {
          return;
        }

        isLoadingConfig = true;
        const selectedModelId = modelSelect.value;
        const selectedAgentId = agentSelect.value;
        const selectedMaterialIds = [...materialPresetIds];
        const selectedColorPaletteId = colorPaletteSelect.value;
        const selectedShapeArchitectureId = shapeArchitectureSelect.value;

        try {
          const [modelsResponse, agentsResponse, materialsResponse, colorPalettesResponse, shapeArchitecturesResponse, scenariosResponse, scenarioAgentsResponse] = await Promise.all([
            apiFetch("/api/config/models"),
            apiFetch("/api/config/style-skills"),
            apiFetch("/api/config/materials"),
            apiFetch("/api/config/color-palettes"),
            apiFetch("/api/config/shape-architectures"),
            apiFetch("/api/config/operation-scenarios"),
            apiFetch("/api/config/scenario-agents"),
          ]);
          const modelsData = await modelsResponse.json();
          const agentsData = await agentsResponse.json();
          const materialsData = await materialsResponse.json();
          const colorPalettesData = await colorPalettesResponse.json();
          const shapeArchitecturesData = await shapeArchitecturesResponse.json();
          const scenariosData = await scenariosResponse.json();
          const scenarioAgentsData = await scenarioAgentsResponse.json();

          modelSelect.innerHTML = "";
          agentSelect.innerHTML = "";
          colorPaletteSelect.innerHTML = "";
          shapeArchitectureSelect.innerHTML = "";

          for (const model of modelsData.models.filter((item) => item.enabled && (item.purpose || "image") === "image")) {
            const option = document.createElement("option");
            option.value = model.id;
            option.textContent = model.name;
            modelSelect.appendChild(option);
          }

          const emptyAgentOption = document.createElement("option");
          emptyAgentOption.value = "";
          emptyAgentOption.textContent = "未选择风格套装";
          agentSelect.appendChild(emptyAgentOption);

          for (const agent of (agentsData.styleSkills || agentsData.agents || []).filter((item) => item.enabled)) {
            const option = document.createElement("option");
            option.value = agent.id;
            option.textContent = agent.name;
            agentSelect.appendChild(option);
          }

          materials = (materialsData.materials || []).filter((item) => item.enabled);
          colorPalettes = (colorPalettesData.colorPalettes || []).filter((item) => item.enabled);
          operationScenarios = (scenariosData.operationScenarios || []).filter((item) => item.enabled);
          scenarioAgents = (scenarioAgentsData.scenarioAgents || defaultScenarioAgents).filter((item) => item.enabled !== false);

          const emptyPaletteOption = document.createElement("option");
          emptyPaletteOption.value = "";
          emptyPaletteOption.textContent = "未选择配色";
          colorPaletteSelect.appendChild(emptyPaletteOption);

          for (const palette of colorPalettes) {
            const option = document.createElement("option");
            option.value = palette.id;
            option.textContent = palette.name;
            colorPaletteSelect.appendChild(option);
          }

          const emptyShapeArchitectureOption = document.createElement("option");
          emptyShapeArchitectureOption.value = "";
          emptyShapeArchitectureOption.textContent = "未选择形状";
          shapeArchitectureSelect.appendChild(emptyShapeArchitectureOption);

          for (const architecture of (shapeArchitecturesData.shapeArchitectures || []).filter((item) => item.enabled)) {
            const option = document.createElement("option");
            option.value = architecture.id;
            option.textContent = architecture.name;
            shapeArchitectureSelect.appendChild(option);
          }

          const modelOptions = [...modelSelect.options];
          if (selectedModelId && modelOptions.some((option) => option.value === selectedModelId)) {
            modelSelect.value = selectedModelId;
          } else if (modelOptions.some((option) => option.value === defaultModelId)) {
            modelSelect.value = defaultModelId;
          }

          if (selectedAgentId && [...agentSelect.options].some((option) => option.value === selectedAgentId)) {
            agentSelect.value = selectedAgentId;
          }

          materialPresetIds = selectedMaterialIds.filter((id) => materials.some((material) => material.id === id));

          if (selectedColorPaletteId && [...colorPaletteSelect.options].some((option) => option.value === selectedColorPaletteId)) {
            colorPaletteSelect.value = selectedColorPaletteId;
          }

          if (selectedShapeArchitectureId && [...shapeArchitectureSelect.options].some((option) => option.value === selectedShapeArchitectureId)) {
            shapeArchitectureSelect.value = selectedShapeArchitectureId;
          }

          colorPaletteId = colorPaletteSelect.value;
          shapeArchitectureId = shapeArchitectureSelect.value;
          renderPaletteInlineEditor();
          renderMaterialPanel();
          updateRunState();
        } finally {
          isLoadingConfig = false;
        }
      }

      async function ensureConversation(signal) {
        if (activeConversationId) {
          return activeConversationId;
        }

        const response = await apiFetch("/api/conversations", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            modelId: modelSelect.value,
            agentId: agentSelect.value,
          }),
          signal,
        });
        const data = await response.json();
        if (!response.ok || !data.conversation) {
          throw new Error(data.error || "创建对话失败");
        }
        activeConversationId = data.conversation.id;
        return activeConversationId;
      }

      async function submitConversationMessage(content, messageAttachments, inputType = "auto", hasRetried = false, signal) {
        const conversationId = await ensureConversation(signal);
        const directPrompt = buildDirectPromptFromScenarioDraft(content);
        const response = await apiFetch(`/api/conversations/${conversationId}/messages`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            content,
            modelId: modelSelect.value,
            agentId: agentSelect.value,
            inputType,
            selectionAssets: messageAttachments,
            batchSize,
            aspectRatio: resolveAspectRatio(),
            resolution,
            materialPresetIds,
            colorPaletteId,
            customColorPalette: getCustomColorPalettePayload(),
            shapeArchitectureId,
            operationScenarioId: selectedOperationScenarioId || undefined,
            directPrompt,
            usePromptOrchestrator: directPrompt ? false : true,
          }),
          signal,
        });
        const data = await response.json();

        if ((response.status === 404 || data.error === "Conversation not found.") && !hasRetried) {
          activeConversationId = null;
          return submitConversationMessage(content, messageAttachments, inputType, true, signal);
        }

        if (!response.ok) {
          throw new Error(data.error || "生成失败");
        }

        return data;
      }

      async function completeScenarioAgentPrompt(content, messageAttachments, signal) {
        const response = await apiFetch("/api/scenario-agent/complete", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            content,
            selectionAssets: messageAttachments,
          }),
          signal,
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "场景智能体生成 Prompt 失败");
        }

        return data;
      }

      function isAbortError(error) {
        return error?.name === "AbortError";
      }

      function stopGeneration() {
        if (activeGenerationController) {
          activeGenerationController.abort();
        }
      }

      async function sendMessage() {
        if (isSending) {
          stopGeneration();
          return;
        }

        const content = messageInput.value.trim();

        if (!content && !selectedAssets.length) {
          return;
        }

        const hasConfig = Boolean(
          agentSelect.value
          || colorPaletteId
          || shapeArchitectureId
          || materialPresetIds.length
          || selectedOperationScenarioId
        );
        if (!content && selectedAssets.length && !hasConfig) {
          const hint = "请描述要怎么处理这张图，或选择一个风格/形状/配色/材质。";
          selectionStatus.textContent = hint;
          addMessage("system", hint);
          updateRunState();
          return;
        }

        const highestReferencedImageIndex = getHighestReferencedImageIndex(content);
        if (highestReferencedImageIndex > selectedAssets.length) {
          addMessage("system", `你提到了图${highestReferencedImageIndex}，但当前只添加了 ${selectedAssets.length} 张参考图。请先点击“添加选中图”把图${highestReferencedImageIndex}加进来。`);
          return;
        }

        const scenarioAgent = getScenarioAgentFromContent(content);
        const messageAttachments = getLabeledSelectedAssets();

        if (scenarioAgent) {
          const generationController = new AbortController();
          activeGenerationController = generationController;
          isSending = true;
          clearStyleSelectionsForScenarioAgent();
          updateRunState();
          const pending = addMessage("system", `正在调用「${scenarioAgent.name}」补全 Prompt...`);

          try {
            const data = await completeScenarioAgentPrompt(content, messageAttachments, generationController.signal);
            messageInput.value = data.prompt;
            saveScenarioAgentDraft({
              scenarioAgentId: data.scenarioAgent?.agentId || scenarioAgent.id,
              promptMain: data.prompt,
              promptFixedPositive: data.promptFixedPositive || "",
              promptNegative: data.promptNegative || "",
            });
            const preferredAspectRatio = getPreferredAspectRatioForScenarioAgent(scenarioAgent, data.prompt);

            if (preferredAspectRatio) {
              aspectRatio = preferredAspectRatio;
              aspectRatioSelect.value = preferredAspectRatio;
            }
            resizeMessageInput();
            pending.textContent = data.promptNegative
              ? `「${scenarioAgent.name}」已生成 Prompt，已回填正向 Prompt，并会在生成时使用智能体负面提示词：${data.promptNegative}`
              : `「${scenarioAgent.name}」已生成 Prompt，已回填到输入框。你可以继续修改，确认后再点击生成。`;
            selectionStatus.textContent = "场景智能体已补全 Prompt；普通风格套装和自由搭配已清空。";
          } catch (error) {
            pending.textContent = isAbortError(error)
              ? "已暂停场景智能体补全。"
              : getReadableError(error);
          } finally {
            isSending = false;
            if (activeGenerationController === generationController) {
              activeGenerationController = null;
            }
            updateRunState();
          }
          return;
        }

        const loadingText = batchSize > 1
          ? `正在并发渲染 ${batchSize} 张候选图...`
          : "正在渲染一种‘甲方闭嘴’的高级感...";
        let renderTimer;
        const generationController = new AbortController();
        activeGenerationController = generationController;
        isSending = true;
        updateRunState();
        const inputType = await inferInputType(messageAttachments, content);
        if (generationController.signal.aborted) {
          isSending = false;
          activeGenerationController = null;
          updateRunState();
          return;
        }

        if (content || messageAttachments.length) {
          addMessage("user", content, messageAttachments);
        }
        messageInput.value = "";
        resizeMessageInput();
        const pending = addMessage("system", `${loadingText} 已用 0 秒`);
        const startedAt = Date.now();

        renderTimer = window.setInterval(() => {
          const elapsedSeconds = Math.floor((Date.now() - startedAt) / 1000);
          pending.textContent = `${loadingText} 已用 ${elapsedSeconds} 秒`;
        }, 1000);

        try {
          const data = await submitConversationMessage(content, messageAttachments, inputType, false, generationController.signal);
          pending.textContent = data.conversation.messages.at(-1).content;
          activeConversationId = data.conversation.id;
          renderResults(data.task);
          clearSelectionsAfterGeneration();
        } catch (error) {
          pending.textContent = isAbortError(error)
            ? "已暂停本次生成。"
            : getReadableError(error);
        } finally {
          window.clearInterval(renderTimer);
          selectedOperationScenarioId = "";
          isSending = false;
          if (activeGenerationController === generationController) {
            activeGenerationController = null;
          }
          updateRunState();
        }
      }

      function syncCurrentSelection() {
        addSelectionButton.disabled = true;
        selectionStatus.textContent = "正在添加当前选中图...";
        parent.postMessage({ pluginMessage: { type: "sync-selection" } }, "*");
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function setupResizeHandle() {
        let isResizing = false;
        let startX = 0;
        let startY = 0;
        let startWidth = 0;
        let startHeight = 0;

        function handleMove(event) {
          if (!isResizing) {
            return;
          }

          const width = clamp(startWidth + event.clientX - startX, fixedWindowWidth, 1200);
          const height = clamp(startHeight + event.clientY - startY, 520, 1100);
          expandedWindowSize = { width, height };
          postResize(width, height);
        }

        function stopResize() {
          isResizing = false;
          document.body.classList.remove("resizing");
          document.removeEventListener("mousemove", handleMove);
          document.removeEventListener("mouseup", stopResize);
        }

        resizeHandle.addEventListener("mousedown", (event) => {
          event.preventDefault();
          isResizing = true;
          document.body.classList.add("resizing");
          startX = event.clientX;
          startY = event.clientY;
          startWidth = window.innerWidth;
          startHeight = window.innerHeight;
          document.addEventListener("mousemove", handleMove);
          document.addEventListener("mouseup", stopResize);
        });

        resizeHandle.addEventListener("dblclick", () => {
          const shouldExpand = window.innerWidth < 680;
          expandedWindowSize = {
            width: shouldExpand ? 760 : fixedWindowWidth,
            height: shouldExpand ? 860 : fixedWindowHeight,
          };
          postResize(expandedWindowSize.width, expandedWindowSize.height);
        });
      }

      collapseButton.addEventListener("click", () => {
        if (isCollapsed) {
          isCollapsed = false;
          document.body.classList.remove("is-collapsed");
          collapseButton.title = "收起插件";
          collapseButton.setAttribute("aria-label", "收起插件");
          postResize(expandedWindowSize.width, expandedWindowSize.height);
          return;
        }

        expandedWindowSize = {
          width: clamp(window.innerWidth || fixedWindowWidth, fixedWindowWidth, 1200),
          height: clamp(window.innerHeight || fixedWindowHeight, 520, 1100),
        };
        isCollapsed = true;
        document.body.classList.add("is-collapsed");
        collapseButton.title = "展开插件";
        collapseButton.setAttribute("aria-label", "展开插件");
        postResize(96, 116);
      });

      document.querySelector("#new-chat-button").addEventListener("click", async () => {
        await loadConfig();
        activeConversationId = null;
        agentSelect.value = "";
        aspectRatioSelect.value = "auto";
        resolutionSelect.value = "2k";
        batchSizeSelect.value = "1";
        colorPaletteSelect.value = "";
        shapeArchitectureSelect.value = "";
        aspectRatio = "auto";
        resolution = "2k";
        batchSize = 1;
        selectedAssets = [];
        materialPresetIds = [];
        colorPaletteId = "";
        customPaletteColors = [];
        shapeArchitectureId = "";
        selectedOperationScenarioId = "";
        clearScenarioAgentDraft();
        messageInput.value = "";
        resizeMessageInput();
        selectionBar.textContent = "正在读取当前选区...";
        selectionStatus.textContent = "打开插件不会自动读取选区。";
        updateAspectRatioAutoLabel();
        closePalettePanel();
        renderPaletteInlineEditor({ resetColors: true });
        renderMaterialPanel();
        renderAttachments();
        chat.innerHTML = "";
        addMessage("system", "已清空当前面板。请选择画布对象并描述本轮需求。");
        updateRunState();
      });

      modelSelect.addEventListener("focus", loadConfig);
      agentSelect.addEventListener("focus", loadConfig);
      agentSelect.addEventListener("change", updateRunState);
      materialSelectButton.addEventListener("click", async () => {
        await loadConfig();
        cancelMaterialPanelAutoClose();
        closePalettePanel();
        materialPanel.classList.toggle("open");
      });
      materialSelectButton.addEventListener("mouseenter", openMaterialPanel);
      materialSelectButton.addEventListener("mouseleave", () => {
        if (materialPanel.classList.contains("open")) {
          scheduleMaterialPanelAutoClose();
        }
      });
      materialPanel.addEventListener("mouseenter", cancelMaterialPanelAutoClose);
      materialPanel.addEventListener("mouseleave", scheduleMaterialPanelAutoClose);
      colorPaletteSelect.addEventListener("focus", async () => {
        await loadConfig();
        openPalettePanel();
      });
      paletteSelectWrap.addEventListener("mouseenter", () => {
        cancelPalettePanelAutoClose();
        openPalettePanel();
      });
      paletteSelectWrap.addEventListener("mouseleave", () => {
        if (paletteInlineEditor.classList.contains("open")) {
          schedulePalettePanelAutoClose();
        }
      });
      aspectRatioSelect.addEventListener("change", () => {
        aspectRatio = aspectRatioSelect.value;
      });
      resolutionSelect.addEventListener("change", () => {
        resolution = resolutionSelect.value;
      });
      batchSizeSelect.addEventListener("change", () => {
        batchSize = Math.min(4, Math.max(1, Number(batchSizeSelect.value) || 1));
        batchSizeSelect.value = String(batchSize);
      });
      colorPaletteSelect.addEventListener("change", () => {
        colorPaletteId = colorPaletteSelect.value;
        customPaletteColors = [];
        renderPaletteInlineEditor({ resetColors: true });
        openPalettePanel();
        updateRunState();
      });
      pluginAddPaletteColorButton.addEventListener("click", () => {
        cancelPalettePanelAutoClose();
        addPluginPaletteColorRow();
      });
      paletteInlineEditor.addEventListener("mouseenter", cancelPalettePanelAutoClose);
      paletteInlineEditor.addEventListener("mouseleave", schedulePalettePanelAutoClose);
      shapeArchitectureSelect.addEventListener("focus", loadConfig);
      shapeArchitectureSelect.addEventListener("change", () => {
        shapeArchitectureId = shapeArchitectureSelect.value;
      });
      document.addEventListener("click", (event) => {
        if (!materialPanel.contains(event.target) && event.target !== materialSelectButton) {
          materialPanel.classList.remove("open");
        }

        if (!paletteInlineEditor.contains(event.target) && event.target !== colorPaletteSelect) {
          closePalettePanel();
        }

        if (!scenarioPanel.contains(event.target) && event.target !== messageInput) {
          hideScenarioPanel();
        }
      });
      addSelectionButton.addEventListener("click", syncCurrentSelection);
      sendButton.addEventListener("click", sendMessage);
      messageInput.addEventListener("input", () => {
        resizeMessageInput();
        updateRunState();
        renderScenarioSuggestions();
      });
      messageInput.addEventListener("keydown", (event) => {
        if ((event.key === "Enter" || event.key === "Tab") && scenarioPanel.classList.contains("open") && activeScenarioSuggestions[0]) {
          event.preventDefault();
          insertActiveScenarioSuggestion(activeScenarioSuggestions[0]);
          return;
        }

        if (event.key === "Escape" && scenarioPanel.classList.contains("open")) {
          event.preventDefault();
          hideScenarioPanel();
          return;
        }

        if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
          sendMessage();
        }
      });
      messageInput.addEventListener("click", renderScenarioSuggestions);
      setupResizeHandle();
      resizeMessageInput();
      window.addEventListener("resize", scrollComposerActionsIntoView);
      window.addEventListener("load", scheduleInitialComposerActionsScroll);
      scheduleInitialComposerActionsScroll();

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;

        if (!message) {
          return;
        }

        if (message.type === "selection-synced") {
          const incomingAssets = message.payload.assets || [];
          selectedAssets = mergeSelectedAssets(message.payload.assets || []);
          updateAspectRatioAutoLabel();
          renderAttachments();
          selectionBar.textContent = selectedAssets.length
            ? `已添加 ${selectedAssets.length} 张参考图，按选择顺序标为图1、图2。可点击缩略图右上角删除。`
            : message.payload.message;
          selectionStatus.textContent = incomingAssets.length
            ? `已添加 ${selectedAssets.length} 张参考图，按选择顺序标为图1、图2。`
            : message.payload.message;
          addSelectionButton.disabled = false;
          updateRunState();
        }

        if (message.type === "selection-error") {
          selectionBar.textContent = message.message;
          selectionStatus.textContent = message.message;
          addSelectionButton.disabled = false;
        }

        if (message.type === "insert-result-finished") {
          const pending = pendingInsertButtons.get(message.requestId);

          if (pending) {
            pending.button.textContent = message.ok ? "已插入" : pending.originalText;
            pending.button.disabled = false;
            pendingInsertButtons.delete(message.requestId);

            if (message.ok) {
              window.setTimeout(() => {
                pending.button.textContent = pending.originalText;
              }, 1200);
            }
          }

          if (!message.ok) {
            addMessage("system", message.message || "插入 Figma 失败。");
          }
        }
      };

      loadConfig()
        .then(() => {
          updateRunState();
          scheduleInitialComposerActionsScroll();
        })
        .catch((error) => {
          addMessage("system", getReadableError(error));
        });
    </script>
  </body>
</html>
