<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        color: #f4f7fb;
        background: #0b0f17;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --select-arrow: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 14 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3.25 5.25L7 8.75L10.75 5.25' stroke='%236b7280' stroke-width='1.25' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #0b0f17;
      }

      button,
      select,
      textarea {
        font: inherit;
      }

      .app {
        position: relative;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        height: 100vh;
        background: radial-gradient(circle at 50% 0%, #172238 0%, #0b0f17 48%, #070a0f 100%);
      }

      button,
      select {
        min-height: 20px;
        border: 1px solid #283244;
        background: #121826;
        color: #f4f7fb;
        cursor: pointer;
        font-size: 9px;
        font-weight: 650;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .selection-bar {
        display: none;
      }

      .history-panel {
        position: fixed;
        z-index: 30;
        display: none;
        pointer-events: none;
        width: min(360px, calc(100vw - 24px));
        max-height: 220px;
        overflow: auto;
        border: 1px solid #283244;
        border-radius: 20px;
        background: #101624;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
      }

      .history-panel.open {
        display: block;
        pointer-events: auto;
      }

      .history-item {
        width: 100%;
        min-height: auto;
        border: 0;
        border-bottom: 1px solid #202a3a;
        border-radius: 20px;
        padding: 12px 14px;
        background: transparent;
        color: #e5e7eb;
        text-align: left;
      }

      .chat {
        display: grid;
        gap: 12px;
        align-content: start;
        min-height: 0;
        overflow: auto;
        padding: 16px 14px 12px;
        background: transparent;
      }

      .message {
        display: grid;
        gap: 8px;
        max-width: 94%;
        border: 1px solid #24324a;
        border-radius: 20px;
        padding: 14px 16px;
        background: #111827;
        color: #dbeafe;
        font-size: 12px;
        font-weight: 620;
        line-height: 1.7;
      }

      .message-content {
        white-space: pre-wrap;
      }

      .message-attachments {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .message-attachment {
        position: relative;
        width: 52px;
        height: 52px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.32);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.28);
      }

      .message-attachment img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .message-attachment-label {
        position: absolute;
        left: 4px;
        bottom: 4px;
        border-radius: 999px;
        padding: 1px 5px;
        background: rgba(2, 6, 23, 0.72);
        color: #ffffff;
        font-size: 9px;
        font-weight: 700;
        line-height: 1.4;
      }

      .message.user {
        justify-self: end;
        border-color: #2f6fed;
        background: linear-gradient(135deg, #1d4ed8, #2563eb);
        color: #ffffff;
      }

      .reuse-message-button {
        justify-self: end;
        position: relative;
        width: 20px;
        height: 20px;
        border: 0;
        border-radius: 6px;
        padding: 0;
        background: transparent;
        color: rgba(255, 255, 255, 0.78);
      }

      .reuse-message-button:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
      }

      .reuse-message-button::before,
      .reuse-message-button::after {
        position: absolute;
        width: 8px;
        height: 10px;
        border: 1.4px solid currentColor;
        border-radius: 2px;
        content: "";
      }

      .reuse-message-button::before {
        top: 4px;
        left: 5px;
        opacity: 0.55;
      }

      .reuse-message-button::after {
        top: 6px;
        left: 8px;
        background: #2563eb;
      }

      .message.system {
        max-width: 100%;
        border-color: #202a3a;
        background: rgba(17, 24, 39, 0.72);
        color: #9ca3af;
        font-weight: 500;
      }

      .results {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .result-card {
        overflow: hidden;
        border: 1px solid #283244;
        border-radius: 20px;
        background: #0f172a;
      }

      .result-card img {
        display: block;
        width: 100%;
      }

      .result-card div {
        display: grid;
        gap: 6px;
        padding: 8px;
      }

      .result-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .debug-panel {
        border: 1px solid #283244;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.72);
        color: #cbd5e1;
        font-size: 10px;
        line-height: 1.6;
      }

      .debug-panel summary {
        cursor: pointer;
        padding: 8px 10px;
        color: #e5e7eb;
        font-weight: 700;
      }

      .debug-copy-button {
        margin: 0 10px 8px;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 10px;
        background: #182235;
        color: #bfdbfe;
      }

      .debug-section {
        display: grid;
        gap: 4px;
        border-top: 1px solid #283244;
        padding: 8px 10px;
      }

      .debug-section strong {
        color: #93c5fd;
      }

      .debug-section pre {
        max-height: 180px;
        overflow: auto;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #e5e7eb;
        font-family: inherit;
      }

      .agent-console {
        display: grid;
        gap: 10px;
        min-width: 0;
        padding: clamp(8px, 1.8vw, 12px);
        border-top: 1px solid #161e2c;
        background: rgba(7, 10, 15, 0.96);
      }

      .control-strip {
        position: relative;
        z-index: 2;
        display: grid;
        width: 100%;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        overflow: visible;
        gap: 5px 8px;
      }

      .control-section-label {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 6px;
        justify-content: flex-start;
        min-width: 0;
        padding: 0 4px;
        color: #94a3b8;
        font-size: 9px;
        font-weight: 700;
        line-height: 1.4;
      }

      .tooltip-trigger {
        position: relative;
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        width: 14px;
        height: 14px;
        border: 1px solid #334155;
        border-radius: 999px;
        color: #94a3b8;
        font-size: 9px;
        font-weight: 700;
        cursor: help;
      }

      .tooltip-trigger::before,
      .tooltip-trigger::after {
        position: absolute;
        z-index: 40;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.12s ease, transform 0.12s ease;
      }

      .tooltip-trigger::before {
        left: 10px;
        bottom: calc(100% - 2px);
        width: 18px;
        height: 14px;
        background-image: url("data:image/svg+xml,%3Csvg width='18' height='14' viewBox='0 0 18 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0H18L3.4 13.4C2.1 14.6 0 13.7 0 11.9V0Z' fill='%23111827'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-size: 18px 14px;
        content: "";
        transform: translateY(3px);
      }

      .tooltip-trigger::after {
        left: 0;
        bottom: calc(100% + 7px);
        width: min(218px, calc(100vw - 28px));
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 8px 10px;
        background: #111827;
        color: #f8fafc;
        content: attr(data-tooltip);
        font-size: 10px;
        font-weight: 600;
        line-height: 1.5;
        transform: translateY(3px);
        white-space: normal;
      }

      .tooltip-trigger:hover::before,
      .tooltip-trigger:focus-visible::before {
        opacity: 1;
        transform: translateY(0);
      }

      .tooltip-trigger:hover::after,
      .tooltip-trigger:focus-visible::after {
        opacity: 1;
        transform: translateY(0);
      }

      .control-select,
      .icon-button {
        min-height: 27px;
        border-radius: 20px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      }

      .control-select {
        width: 100%;
        min-width: 0;
        padding: 0 32px 0 14px;
        appearance: none;
        -webkit-appearance: none;
        background-image: var(--select-arrow);
        background-position: right 12px center;
        background-repeat: no-repeat;
        background-size: 14px 14px;
        pointer-events: auto;
      }

      #agent-select {
        grid-column: 1 / -1;
        min-width: 120px;
      }

      .icon-button {
        display: grid;
        place-items: center;
        padding: 0;
        font-size: 9px;
      }

      .composer-card {
        position: relative;
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: 0;
        overflow: hidden;
        padding-top: clamp(18px, 4vh, 29px);
        padding-bottom: clamp(18px, 4vh, 29px);
        border: 1px solid #283244;
        border-radius: 20px;
        background: #111827;
      }

      .attachment-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 18px 24px 0;
      }

      .selection-tools {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 24px 0;
      }

      .add-selection-button {
        min-height: 28px;
        border-radius: 999px;
        padding: 0 12px;
        background: #182235;
        color: #e5e7eb;
        white-space: nowrap;
      }

      .selection-status {
        min-width: 0;
        overflow: hidden;
        color: #64748b;
        font-size: 10px;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .attachment-row:empty {
        display: none;
      }

      .thumb {
        position: relative;
        width: 46px;
        height: 46px;
        overflow: hidden;
        border: 1px solid #334155;
        border-radius: 20px;
        background: #0b1220;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
      }

      .thumb img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .thumb-label {
        position: absolute;
        left: 3px;
        bottom: 3px;
        border-radius: 999px;
        padding: 1px 5px;
        background: rgba(2, 6, 23, 0.72);
        color: #ffffff;
        font-size: 9px;
        font-weight: 700;
        line-height: 1.4;
      }

      .thumb button {
        position: absolute;
        top: 2px;
        right: 2px;
        display: none;
        width: 18px;
        min-width: 18px;
        height: 18px;
        min-height: 18px;
        border: 0;
        border-radius: 20px;
        padding: 0;
        background: rgba(0, 0, 0, 0.72);
        color: #ffffff;
        font-size: 18px;
        line-height: 1;
      }

      .thumb:hover button {
        display: block;
      }

      textarea {
        width: 100%;
        flex: 0 0 auto;
        height: 72px;
        min-height: 72px;
        max-height: clamp(118px, 24vh, 210px);
        overflow-y: hidden;
        resize: none;
        border: 0;
        outline: 0;
        padding: 9px 12px;
        background: transparent;
        color: #f8fafc;
        font-size: 12px;
      }

      textarea::placeholder {
        color: #64748b;
      }

      .scenario-panel {
        position: absolute;
        right: 14px;
        bottom: 82px;
        left: 14px;
        z-index: 18;
        display: none;
        max-height: 180px;
        overflow: auto;
        border: 1px solid #334155;
        border-radius: 20px;
        padding: 6px;
        background: #1f2937;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
      }

      .scenario-panel.open {
        display: grid;
        gap: 4px;
      }

      .scenario-option {
        display: grid;
        gap: 2px;
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 8px 10px;
        background: transparent;
        color: #f8fafc;
        text-align: left;
      }

      .scenario-option:hover,
      .scenario-option.active {
        background: #111827;
      }

      .scenario-option span {
        color: #94a3b8;
        font-size: 10px;
        font-weight: 500;
      }

      .composer-footer {
        display: grid;
        grid-template-columns: minmax(56px, 72px) minmax(60px, 82px) minmax(104px, 1fr) 34px minmax(76px, 1fr);
        flex: 0 0 auto;
        align-items: center;
        overflow: visible;
        gap: 8px;
        width: 100%;
        min-width: 0;
        padding: 0 10px;
      }

      .pill-select {
        min-height: 26px;
        border-radius: 20px;
        background: #0b1220;
      }

      .pill-select {
        width: 100%;
        min-width: 0;
        padding: 0 32px 0 12px;
        appearance: none;
        -webkit-appearance: none;
        background-image: var(--select-arrow);
        background-position: right 12px center;
        background-repeat: no-repeat;
        background-size: 14px 14px;
        text-align: center;
      }

      #new-chat-button {
        font-size: 13px;
      }

      #color-palette-select {
        width: 100%;
        min-width: 0;
      }

      #model-select {
        width: 100%;
        min-width: 0;
      }

      .multi-select-wrap {
        position: relative;
        min-width: 0;
      }

      .multi-select-button {
        width: 100%;
        min-width: 0;
        min-height: 26px;
        border-radius: 20px;
        padding: 0 32px 0 14px;
        background: #0b1220;
        background-image: var(--select-arrow);
        background-position: right 12px center;
        background-repeat: no-repeat;
        background-size: 14px 14px;
        font-size: 9px;
        text-align: left;
      }

      .multi-select-panel {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        left: auto;
        z-index: 20;
        display: none;
        width: min(240px, calc(100vw - 20px));
        max-width: calc(100vw - 20px);
        max-height: 220px;
        overflow-x: hidden;
        overflow-y: auto;
        border: 1px solid #334155;
        border-radius: 20px;
        padding: 8px;
        background: #1f2937;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
      }

      .multi-select-panel.open {
        display: grid;
        gap: 4px;
      }

      .multi-select-panel-header {
        display: flex;
        justify-content: flex-start;
        padding: 0 8px 4px;
      }

      .multi-select-clear-button {
        min-height: 22px;
        border: 1px solid #475569;
        border-radius: 999px;
        padding: 0 10px;
        background: #111827;
        color: #cbd5e1;
        font-size: 10px;
        font-weight: 700;
        cursor: pointer;
      }

      .multi-select-clear-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .material-option {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        border-radius: 14px;
        padding: 7px 8px;
        color: #f8fafc;
        font-size: 12px;
        cursor: pointer;
        white-space: normal;
      }

      .material-option:hover {
        background: #111827;
      }

      .material-option input {
        flex: 0 0 auto;
        width: 14px;
        height: 14px;
      }

      .material-option span {
        min-width: 0;
        overflow: visible;
        line-height: 1.35;
        text-overflow: clip;
        white-space: normal;
      }

      .quantity-label {
        color: #94a3b8;
        font-size: 9px;
        font-weight: 650;
      }

      .run-button {
        width: 100%;
        min-width: 0;
        min-height: 26px;
        border: 0;
        border-radius: 20px;
        background: #1f2937;
        color: #64748b;
        font-size: 9px;
      }

      .run-button:not(:disabled) {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: #ffffff;
      }

      .resize-handle {
        position: fixed;
        right: 10px;
        bottom: 10px;
        z-index: 10;
        width: 22px;
        min-width: 22px;
        height: 22px;
        min-height: 22px;
        border: 0;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.92);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
        cursor: nwse-resize;
        opacity: 0.8;
      }

      .resize-handle::before,
      .resize-handle::after {
        content: "";
        position: absolute;
        right: 6px;
        bottom: 7px;
        width: 8px;
        height: 2px;
        border-radius: 20px;
        background: #94a3b8;
        transform: rotate(-45deg);
        transform-origin: right center;
      }

      .resize-handle::after {
        right: 6px;
        bottom: 10px;
        width: 5px;
      }

      .resize-handle:hover {
        opacity: 1;
      }

      body.resizing {
        cursor: nwse-resize;
        user-select: none;
      }

      @media (max-width: 520px) {
        .chat {
          gap: 10px;
          padding: 12px 10px 10px;
        }

        .message {
          max-width: 100%;
          padding: 12px 13px;
        }

        .agent-console {
          padding: 8px;
        }

        .results {
          grid-template-columns: 1fr;
        }

        .control-strip {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 5px;
        }

        .control-section-label {
          font-size: 8.5px;
        }

        .control-select,
        .multi-select-button {
          min-height: 28px;
          padding-right: 28px;
          padding-left: 10px;
          font-size: 8.5px;
        }

        #agent-select {
          grid-column: 1 / -1;
          min-width: 0;
          font-size: 10px;
        }

        .composer-card {
          min-height: 0;
          padding-top: 18px;
          padding-bottom: 18px;
        }

        .composer-footer {
          grid-template-columns: minmax(54px, 0.72fr) minmax(54px, 0.72fr) minmax(92px, 1.45fr) 32px;
          gap: 5px;
          padding: 0 8px;
        }

        .pill-select,
        .icon-button,
        .run-button {
          min-height: 30px;
          font-size: 9px;
        }

        #model-select {
          font-size: 8.5px;
        }

        #new-chat-button {
          width: 32px;
          min-width: 32px;
          padding: 0;
          font-size: 13px;
        }

        .run-button {
          grid-column: 1 / -1;
        }
      }

      /* Minimal premium light theme for the Figma plugin surface. */
      :root {
        color: #171a21;
        background: #f7f7f5;
      }

      body {
        background: #f7f7f5;
      }

      .app {
        background: linear-gradient(180deg, #fbfbfa 0%, #f7f7f5 100%);
      }

      button,
      select {
        border-color: #deded9;
        background-color: #ffffff;
        color: #20242d;
        box-shadow: none;
      }

      button:hover:not(:disabled),
      select:hover {
        border-color: #c8c8c1;
        background-color: #fafafa;
      }

      button:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: none;
      }

      .chat {
        padding: 18px 16px 10px;
      }

      .message {
        border-color: #e1e1dc;
        background: #ffffff;
        color: #20242d;
        box-shadow: 0 8px 24px rgba(23, 26, 33, 0.06);
      }

      .message.user {
        border-color: #171a21;
        background: #171a21;
        color: #ffffff;
        box-shadow: 0 10px 28px rgba(23, 26, 33, 0.16);
      }

      .message.system {
        border-color: #e7e7e2;
        background: #fdfdfc;
        color: #777b84;
      }

      .message-attachment,
      .thumb {
        border-color: #e1e1dc;
        background: #f7f7f5;
        box-shadow: 0 6px 18px rgba(23, 26, 33, 0.08);
      }

      .reuse-message-button {
        color: rgba(255, 255, 255, 0.82);
      }

      .reuse-message-button:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      .reuse-message-button::after {
        background: #171a21;
      }

      .history-panel,
      .scenario-panel,
      .multi-select-panel {
        border-color: #deded9;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 18px 44px rgba(23, 26, 33, 0.12);
      }

      .history-item {
        border-bottom-color: #eeeeea;
        color: #20242d;
      }

      .history-item:hover,
      .scenario-option:hover,
      .scenario-option.active,
      .material-option:hover {
        background: #f5f5f2;
      }

      .result-card,
      .debug-panel,
      .composer-card {
        border-color: #e1e1dc;
        background: #ffffff;
        box-shadow: 0 12px 36px rgba(23, 26, 33, 0.08);
      }

      .debug-panel {
        color: #4e535c;
      }

      .debug-panel summary {
        color: #20242d;
      }

      .debug-copy-button,
      .add-selection-button,
      .pill-select,
      .multi-select-button,
      .icon-button,
      .control-select {
        border-color: #deded9;
        background-color: #ffffff;
        color: #20242d;
      }

      .debug-copy-button:hover,
      .add-selection-button:hover,
      .pill-select:hover,
      .multi-select-button:hover,
      .icon-button:hover,
      .control-select:hover {
        background-color: #f8f8f6;

    <script>
      const apiBase = "https://brand-style-api.onrender.com";
      const accessToken = "brand-style-internal-test-2026";
      const defaultModelId = "nano-banana-pro";
      const modelSelect = document.querySelector("#model-select");

      const scenarioPanel = document.querySelector("#scenario-panel");
      let selectedAssets = [];
      let batchSize = 1;

      let resolution = "2k";
      let materials = [];

      let isLoadingConfig = false;
      let activeConversationId = null;
      let activeGenerationController = null;
      const pendingInsertButtons = new Map();
      const defaultScenarioAgents = [
        {
          id: "miniature-world",
          name: "微缩世界",
          trigger: "/微缩世界",
          description: "适合微缩模型世界、运营活动主视觉、3:4 KV。",
        },
        {
          id: "single-stage",
          name: "单体舞台",
          trigger: "/单体舞台",
          description: "适合圆形舞台单体场景、系列化活动视觉、4:3 KV。",
        },
      ];
      scenarioAgents = [...defaultScenarioAgents];

      function authHeaders(extraHeaders = {}) {
        return {
          ...extraHeaders,
          "x-brand-style-token": accessToken,
        };
      }

      function apiFetch(path, options = {}) {
        return fetch(`${apiBase}${path}`, {
          ...options,
          headers: authHeaders(options.headers || {}),
        });
      }

      function getImageExtension(imageUrl) {
        const dataUrlMatch = imageUrl.match(/^data:image\/([^;]+)/);

        if (dataUrlMatch) {
          return dataUrlMatch[1].replace("jpeg", "jpg").replace("svg+xml", "svg");
        }

        try {
          const extension = new URL(imageUrl).pathname.split(".").pop();

          if (extension && extension.length <= 5) {
            return extension.toLowerCase();
          }
        } catch {
          // Ignore malformed URLs and fall back to PNG.
        }

        return "png";
      }

      function downloadBlobUrl(blobUrl, filename) {
        const link = document.createElement("a");
        link.href = blobUrl;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      async function downloadOriginalImage(result) {
        const extension = getImageExtension(result.imageUrl);
        const sizePart = result.width && result.height ? `-${result.width}x${result.height}` : "";
        const filename = `brand-style-${resolution}-image-${result.rank}${sizePart}.${extension}`;

        if (result.imageUrl.startsWith("data:")) {
          downloadBlobUrl(result.imageUrl, filename);
          return;
        }

        try {
          const response = await fetch(result.imageUrl);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const blob = await response.blob();
          const blobUrl = URL.createObjectURL(blob);
          downloadBlobUrl(blobUrl, filename);
          window.setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        } catch {
          window.open(result.imageUrl, "_blank");
        }
      }

      function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("读取图片失败。"));
          reader.readAsDataURL(blob);
        });
      }

      function loadImageElement(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("图片加载失败，无法插入 Figma。"));
          image.src = src;
        });
      }

      async function normalizeImageForFigma(dataUrl) {
        const figmaSupportedDataUrl = /^data:image\/(?:png|jpe?g|gif);base64,/i.test(dataUrl);
        const image = await loadImageElement(dataUrl);
        const width = Math.max(1, image.naturalWidth || image.width || 1);
        const height = Math.max(1, image.naturalHeight || image.height || 1);
        const maxFigmaSide = 4096;
        const scale = Math.min(1, maxFigmaSide / Math.max(width, height));
        const needsCanvas = !figmaSupportedDataUrl || scale < 1;

        if (!needsCanvas) {
          return { imageUrl: dataUrl, width, height };
        }

        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(width * scale));
        canvas.height = Math.max(1, Math.round(height * scale));
        const context = canvas.getContext("2d");

        if (!context) {
          throw new Error("无法转换图片格式。");
        }

        context.drawImage(image, 0, 0, canvas.width, canvas.height);

        return {
          imageUrl: canvas.toDataURL("image/png"),
          width: canvas.width,
          height: canvas.height,
        };
      }

      async function prepareImageForFigma(result) {
        let dataUrl = result.imageUrl;

        if (!dataUrl.startsWith("data:")) {
          const response = await fetch(dataUrl);

          if (!response.ok) {
            throw new Error(`下载生成图片失败：HTTP ${response.status}`);
          }

          dataUrl = await blobToDataUrl(await response.blob());
        }

        return normalizeImageForFigma(dataUrl);
      }

      async function insertGeneratedResult(button, result) {
        const originalText = button.textContent;
        const requestId = `insert_${Date.now()}_${Math.random().toString(16).slice(2)}`;

        button.disabled = true;
        button.textContent = "插入中...";

        try {
          const prepared = await prepareImageForFigma(result);
          pendingInsertButtons.set(requestId, { button, originalText });
          parent.postMessage({
            pluginMessage: {
              type: "insert-result",
              requestId,
              imageUrl: prepared.imageUrl,
              width: prepared.width || result.width,
              height: prepared.height || result.height,
            },
          }, "*");
        } catch (error) {
          button.disabled = false;
          button.textContent = originalText;
          addMessage("system", getReadableError(error));
        }
      }

      function addMessage(role, content, attachments = []) {
        const node = document.createElement("article");
        const contentNode = document.createElement("div");

        node.className = `message ${role}`;

        if (attachments.length) {
          const attachmentNode = document.createElement("div");
          attachmentNode.className = "message-attachments";

          for (const [index, asset] of attachments.entries()) {
            const item = document.createElement("section");
            const image = document.createElement("img");
            const label = document.createElement("span");

            item.className = "message-attachment";
            image.src = asset.assetDataUrl;
            image.alt = `${asset.referenceLabel || `图${index + 1}`}：${asset.name || asset.filename || "参考图"}`;
            label.className = "message-attachment-label";
            label.textContent = asset.referenceLabel || `图${index + 1}`;
            item.append(image, label);
            attachmentNode.appendChild(item);
          }

          node.appendChild(attachmentNode);
        }

        contentNode.className = "message-content";
        contentNode.textContent = content;
        node.appendChild(contentNode);

        if (role === "user" && content) {
          const reuseButton = document.createElement("button");
          reuseButton.className = "reuse-message-button";
          reuseButton.type = "button";
          reuseButton.title = "复制到输入框";
          reuseButton.setAttribute("aria-label", "复制到输入框");
          reuseButton.addEventListener("click", () => {
            messageInput.value = content;
            selectedOperationScenarioId = "";
            messageInput.focus();
            resizeMessageInput();
            updateRunState();
            renderScenarioSuggestions();
          });
          node.appendChild(reuseButton);
        }

        chat.appendChild(node);
        chat.scrollTop = chat.scrollHeight;
        return node;
      }

      function getReadableError(error) {
        if (error instanceof TypeError && error.message === "Failed to fetch") {
          return "本地服务未启动或连接失败，请先启动后端服务后重试。";
        }

        return error?.message || "发生未知错误，请稍后重试。";
      }

      function getGreatestCommonDivisor(left, right) {
        let a = Math.abs(left);
        let b = Math.abs(right);

        while (b) {
          const remainder = a % b;
          a = b;
          b = remainder;
        }

        return a || 1;
      }

      function resolveAspectRatio() {
        if (aspectRatio !== "auto") {
          return aspectRatio;
        }

        const primaryAsset = selectedAssets.find((asset) => Number(asset.width) > 0 && Number(asset.height) > 0);
        const width = Math.round(Number(primaryAsset?.width));
        const height = Math.round(Number(primaryAsset?.height));

        if (!width || !height) {
          return "1:1";
        }

        const divisor = getGreatestCommonDivisor(width, height);
        return `${width / divisor}:${height / divisor}`;
      }

      function updateAspectRatioAutoLabel() {
        const autoOption = aspectRatioSelect.querySelector('option[value="auto"]');
        if (!autoOption) {
          return;
        }

        const primaryAsset = selectedAssets.find((asset) => Number(asset.width) > 0 && Number(asset.height) > 0);
        if (!primaryAsset) {
          autoOption.textContent = "自动";
          return;
        }

        const width = Math.round(Number(primaryAsset.width));
        const height = Math.round(Number(primaryAsset.height));
        const divisor = getGreatestCommonDivisor(width, height);
        autoOption.textContent = `自动（${width / divisor}:${height / divisor}）`;
      }

      function getLabeledSelectedAssets() {
        return selectedAssets.map((asset, index) => ({
          ...asset,
          referenceLabel: `图${index + 1}`,
        }));
      }

      function hasLineSketchKeyword(value) {
        return /(线稿|草图|描边|轮廓稿|手绘线|sketch|line|outline|wireframe)/i.test(value || "");
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("图片识别失败"));
          image.src = src;
        });
      }

      async function looksLikeLineSketch(asset) {
        if (!asset?.assetDataUrl || !asset.assetDataUrl.startsWith("data:image/")) {
          return false;
        }

        const image = await loadImage(asset.assetDataUrl);
        const maxSide = 96;
        const scale = Math.min(1, maxSide / Math.max(image.naturalWidth || image.width, image.naturalHeight || image.height));
        const width = Math.max(1, Math.round((image.naturalWidth || image.width) * scale));
        const height = Math.max(1, Math.round((image.naturalHeight || image.height) * scale));
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext("2d", { willReadFrequently: true });

        if (!context) {
          return false;
        }

        context.drawImage(image, 0, 0, width, height);
        const pixels = context.getImageData(0, 0, width, height).data;
        let opaquePixels = 0;
        let whitePixels = 0;
        let inkPixels = 0;
        let saturatedPixels = 0;

        for (let index = 0; index < pixels.length; index += 4) {
          const alpha = pixels[index + 3];

          if (alpha < 24) {
            continue;
          }

          const red = pixels[index];
          const green = pixels[index + 1];
          const blue = pixels[index + 2];
          const max = Math.max(red, green, blue);
          const min = Math.min(red, green, blue);
          const luma = 0.2126 * red + 0.7152 * green + 0.0722 * blue;
          const saturation = max ? (max - min) / max : 0;
          opaquePixels += 1;

          if (luma > 244 && saturation < 0.1) {
            whitePixels += 1;
            continue;
          }

          if (luma < 210) {
            inkPixels += 1;
          }

          if (saturation > 0.24 && luma < 245) {
            saturatedPixels += 1;
          }
        }

        if (!opaquePixels) {
          return false;
        }

        const whiteRatio = whitePixels / opaquePixels;
        const inkRatio = inkPixels / opaquePixels;
        const saturatedRatio = saturatedPixels / opaquePixels;

        return whiteRatio > 0.68 && inkRatio > 0.008 && inkRatio < 0.24 && saturatedRatio < 0.14;
      }

      async function inferInputType(assets, content) {
        if (hasLineSketchKeyword(content)) {
          return "line_sketch";
        }

        const primaryAsset = assets[0];

        if (!primaryAsset) {
          return "auto";
        }

        if (hasLineSketchKeyword(`${primaryAsset.name || ""} ${primaryAsset.filename || ""}`)) {
          return "line_sketch";
        }

        try {
          return await looksLikeLineSketch(primaryAsset) ? "line_sketch" : "auto";
        } catch {
          return "auto";
        }
      }

      function getAssetIdentity(asset) {
        return String(asset.id || `${asset.filename}-${asset.sizeBytes}`).replace(/-\d+$/, "");
      }

      function mergeSelectedAssets(incomingAssets) {
        const merged = [...selectedAssets];

        for (const asset of incomingAssets) {
          const identity = getAssetIdentity(asset);
          const existingIndex = merged.findIndex((item) => getAssetIdentity(item) === identity);

          if (existingIndex >= 0) {
            merged[existingIndex] = {
              ...merged[existingIndex],
              ...asset,
            };
            continue;
          }

          merged.push(asset);
        }

        return merged;
      }

      function renderAttachments() {
        attachmentRow.innerHTML = "";

        for (const [index, asset] of selectedAssets.entries()) {
          const thumb = document.createElement("section");
          const image = document.createElement("img");
          const label = document.createElement("span");
          const removeButton = document.createElement("button");

          thumb.className = "thumb";
          thumb.title = `图${index + 1}：${asset.name || asset.filename}`;
          image.src = asset.assetDataUrl;
          image.alt = `图${index + 1}：${asset.name || asset.filename}`;
          label.className = "thumb-label";
          label.textContent = `图${index + 1}`;
          removeButton.type = "button";
          removeButton.setAttribute("aria-label", "删除图片");
          removeButton.textContent = "×";
          removeButton.addEventListener("click", () => {
            selectedAssets = selectedAssets.filter((item) => getAssetIdentity(item) !== getAssetIdentity(asset));
            updateAspectRatioAutoLabel();
            renderAttachments();
            selectionBar.textContent = selectedAssets.length
              ? `已添加 ${selectedAssets.length} 张参考图`
              : "当前没有参考图。点击画布对象会自动添加缩略图。";
            updateRunState();
          });
          thumb.append(image, label, removeButton);
          attachmentRow.appendChild(thumb);
        }

        updateRunState();
      }

      function updateRunState() {
        if (isSending) {
          sendButton.disabled = false;
          sendButton.textContent = "暂停";
          sendButton.title = "暂停本次生成";
          return;
        }

        const hasText = Boolean(messageInput.value.trim());
        const isScenarioAgentPrompt = Boolean(getScenarioAgentFromContent(messageInput.value));
        const hasConfig = Boolean(
          agentSelect.value
          || colorPaletteId
          || shapeArchitectureId
          || materialPresetIds.length
          || selectedOperationScenarioId
        );
        const hasOnlyImageWithoutDirection = selectedAssets.length > 0 && !hasText && !hasConfig;
        const canRun = hasText || (selectedAssets.length > 0 && !hasOnlyImageWithoutDirection);
        const directionHint = "请描述要怎么处理这张图，或选择一个风格/形状/配色/材质。";
        sendButton.disabled = !canRun;
        sendButton.textContent = canRun ? isScenarioAgentPrompt ? "生成Prompt" : "整活" : "没活";
        sendButton.title = hasOnlyImageWithoutDirection
          ? directionHint
          : canRun
            ? isScenarioAgentPrompt ? "让场景智能体补全 Prompt" : "开始生成"
            : "请输入需求，或添加参考图并选择生成方向。";

        if (hasOnlyImageWithoutDirection) {
          selectionStatus.textContent = directionHint;
        } else if (selectionStatus.textContent === directionHint) {
          selectionStatus.textContent = selectedAssets.length
            ? `已添加 ${selectedAssets.length} 张参考图。`
            : "打开插件不会自动读取选区。";
        }
      }

      function resizeMessageInput() {
        messageInput.style.height = "72px";
        const maxHeight = Number.parseFloat(getComputedStyle(messageInput).maxHeight) || 210;
        const nextHeight = Math.min(messageInput.scrollHeight, maxHeight);
        messageInput.style.height = `${Math.max(72, nextHeight)}px`;
        messageInput.style.overflowY = messageInput.scrollHeight > maxHeight ? "auto" : "hidden";
      }

      function updateMaterialButton() {
        if (!materialPresetIds.length) {
          materialSelectButton.textContent = "未选择材质";
          return;
        }

        materialSelectButton.textContent = materialPresetIds.length === 1
          ? materials.find((item) => item.id === materialPresetIds[0])?.name || "材质 1"
          : `材质 ${materialPresetIds.length}`;
      }

      function renderMaterialPanel() {
        materialPanel.innerHTML = "";
        const header = document.createElement("div");
        header.className = "multi-select-panel-header";
        const clearButton = document.createElement("button");
        clearButton.className = "multi-select-clear-button";
        clearButton.type = "button";
        clearButton.textContent = "取消全部勾选";
        clearButton.disabled = !materialPresetIds.length;
        clearButton.addEventListener("click", (event) => {
          event.stopPropagation();
          materialPresetIds = [];
          renderMaterialPanel();
        });
        header.appendChild(clearButton);
        materialPanel.appendChild(header);

        for (const material of materials) {
          const label = document.createElement("label");
          label.className = "material-option";
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = material.id;
          checkbox.checked = materialPresetIds.includes(material.id);
          checkbox.addEventListener("change", () => {
            materialPresetIds = checkbox.checked
              ? [...materialPresetIds, material.id]
              : materialPresetIds.filter((id) => id !== material.id);
            updateMaterialButton();
          });
          const text = document.createElement("span");
          text.textContent = material.name;
          label.append(checkbox, text);
          materialPanel.appendChild(label);
        }

        updateMaterialButton();
      }

      function clearSelectionsAfterGeneration() {
        selectedAssets = [];
        materialPresetIds = [];
        colorPaletteId = "";
        shapeArchitectureId = "";
        selectedOperationScenarioId = "";
        agentSelect.value = "";
        colorPaletteSelect.value = "";
        shapeArchitectureSelect.value = "";
        updateAspectRatioAutoLabel();
        renderAttachments();
        renderMaterialPanel();
        renderScenarioSuggestions();
        selectionBar.textContent = "当前没有参考图。点击“添加选中图”可重新添加。";
        selectionStatus.textContent = "生成完成，已清空本次参考图和搭配选择。";
      }

      function clearStyleSelectionsForScenarioAgent() {
        materialPresetIds = [];
        colorPaletteId = "";
        shapeArchitectureId = "";
        selectedOperationScenarioId = "";
        agentSelect.value = "";
        colorPaletteSelect.value = "";
        shapeArchitectureSelect.value = "";
        materialPanel.classList.remove("open");
        renderMaterialPanel();
        updateRunState();
      }

      function getScenarioAgentFromContent(content) {
        const trimmed = content.trim();

        return scenarioAgents.find((agent) => agent.enabled !== false && (
          trimmed === agent.trigger || trimmed.startsWith(`${agent.trigger} `)
        ));
      }

      function getSlashContext() {
        const cursor = messageInput.selectionStart || 0;
        const beforeCursor = messageInput.value.slice(0, cursor);
        const match = beforeCursor.match(/(^|\s)\/([^\s/]*)$/);

        if (!match) {
          return undefined;
        }

        const query = match[2];
        return {
          query,
          start: cursor - query.length - 1,
          end: cursor,
        };
      }

      function getMentionContext() {
        const cursor = messageInput.selectionStart || 0;
        const beforeCursor = messageInput.value.slice(0, cursor);
        const match = beforeCursor.match(/(^|\s)@([^\s@]*)$/);

        if (!match) {
          return undefined;
        }

        const query = match[2];
        return {
          query,
          start: cursor - query.length - 1,
          end: cursor,
        };
      }

      function hideScenarioPanel() {
        scenarioPanel.classList.remove("open");
        scenarioPanel.innerHTML = "";
        activeScenarioSuggestions = [];
      }

      function buildScenarioText(scenario) {
        return scenario.variablePrompt || scenario.content || "";
      }

      function insertScenarioAgentTrigger(agent) {
        const context = getSlashContext();
        const value = messageInput.value;
        const insertText = `${agent.trigger} `;
        clearStyleSelectionsForScenarioAgent();

        if (!context) {
          messageInput.value = value ? `${value}\n${insertText}` : insertText;
          messageInput.focus();
          messageInput.selectionStart = messageInput.selectionEnd = messageInput.value.length;
          hideScenarioPanel();
          resizeMessageInput();
          selectionStatus.textContent = "已选择场景智能体，请继续输入主题后点击“生成Prompt”。";
          updateRunState();
          return;
        }

        const prefix = value.slice(0, context.start);
        const suffix = value.slice(context.end);
        const needsSpace = suffix && !/^\s/.test(suffix) ? " " : "";
        messageInput.value = `${prefix}${insertText}${needsSpace}${suffix}`;
        const cursor = prefix.length + insertText.length;
        messageInput.focus();
        messageInput.selectionStart = messageInput.selectionEnd = cursor;
        hideScenarioPanel();
        resizeMessageInput();
        selectionStatus.textContent = "已选择场景智能体，请继续输入主题后点击“生成Prompt”。";
        updateRunState();
      }

      function insertScenarioContent(scenario) {
        const context = getMentionContext();
        const value = messageInput.value;
        const insertText = buildScenarioText(scenario);
        selectedOperationScenarioId = scenario.id || "";

        if (!context) {
          messageInput.value = value ? `${value}\n${insertText}` : insertText;
          messageInput.focus();
          messageInput.selectionStart = messageInput.selectionEnd = messageInput.value.length;
          hideScenarioPanel();
          resizeMessageInput();
          updateRunState();
          return;
        }

        const prefix = value.slice(0, context.start);
        const suffix = value.slice(context.end);
        const needsSpace = suffix && !/^\s/.test(suffix) ? " " : "";
        messageInput.value = `${prefix}${insertText}${needsSpace}${suffix}`;
        const cursor = prefix.length + insertText.length + needsSpace.length;
        messageInput.focus();
        messageInput.selectionStart = messageInput.selectionEnd = cursor;
        hideScenarioPanel();
        resizeMessageInput();
        updateRunState();
      }

      function insertActiveScenarioSuggestion(suggestion) {
        if (suggestion.type === "scenario-agent") {
          insertScenarioAgentTrigger(suggestion.agent);
          return;
        }

        insertScenarioContent(suggestion.scenario);
      }

      function renderScenarioSuggestions() {
        const slashContext = getSlashContext();
        if (slashContext) {
          const query = slashContext.query.trim().toLowerCase();
          activeScenarioSuggestions = scenarioAgents
            .filter((agent) => agent.enabled !== false)
            .filter((agent) => !query || agent.name.toLowerCase().includes(query) || agent.trigger.toLowerCase().includes(query))
            .slice(0, 8)
            .map((agent) => ({ type: "scenario-agent", agent }));

          scenarioPanel.innerHTML = "";

          if (!activeScenarioSuggestions.length) {
            hideScenarioPanel();
            return;
          }

          for (const [index, suggestion] of activeScenarioSuggestions.entries()) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `scenario-option${index === 0 ? " active" : ""}`;
            button.innerHTML = `<strong></strong><span></span>`;
            button.querySelector("strong").textContent = suggestion.agent.trigger;
            button.querySelector("span").textContent = suggestion.agent.description;
            button.addEventListener("click", () => insertActiveScenarioSuggestion(suggestion));
            scenarioPanel.appendChild(button);
          }

          scenarioPanel.classList.add("open");
          return;
        }

        const context = getMentionContext();

        if (!context) {
          hideScenarioPanel();
          return;
        }

        const query = context.query.trim().toLowerCase();
        activeScenarioSuggestions = operationScenarios
          .filter((scenario) => !query || scenario.name.toLowerCase().includes(query))
          .slice(0, 8)
          .map((scenario) => ({ type: "operation-scenario", scenario }));

        scenarioPanel.innerHTML = "";

        if (!activeScenarioSuggestions.length) {
          hideScenarioPanel();
          return;
        }

        for (const [index, suggestion] of activeScenarioSuggestions.entries()) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `scenario-option${index === 0 ? " active" : ""}`;
          button.innerHTML = `<strong></strong><span></span>`;
          button.querySelector("strong").textContent = `@${suggestion.scenario.name}`;
          button.querySelector("span").textContent = suggestion.scenario.description || buildScenarioText(suggestion.scenario).slice(0, 36);
          button.addEventListener("click", () => insertActiveScenarioSuggestion(suggestion));
          scenarioPanel.appendChild(button);
        }

        scenarioPanel.classList.add("open");
      }

      function appendDebugSection(parent, title, content) {
        const section = document.createElement("section");
        const heading = document.createElement("strong");
        const body = document.createElement("pre");

        section.className = "debug-section";
        heading.textContent = title;
        body.textContent = content || "无";
        section.append(heading, body);
        parent.appendChild(section);
      }

      function buildReferenceDebugText(task) {
        const references = task.referenceAssets?.length ? task.referenceAssets : task.inputAsset ? [task.inputAsset] : [];

        if (!references.length) {
          return "无参考图";
        }

        return references.map((asset, index) => {
          const label = asset.referenceLabel || `图${index + 1}`;
          const size = asset.width && asset.height ? ` · ${asset.width}x${asset.height}` : "";
          return `${label}：${asset.filename || asset.name || asset.id}${size}`;
        }).join("\n");
      }

      function getHighestReferencedImageIndex(content) {
        const matches = [...content.matchAll(/图\s*(\d+)/g)];

        return matches.reduce((max, match) => Math.max(max, Number(match[1]) || 0), 0);
      }

      function createPromptDebugPanel(task) {
        const panel = document.createElement("details");
        const copyButton = document.createElement("button");
        const debugText = [
          `参考图编号：\n${buildReferenceDebugText(task)}`,

          `语言模型最终负向 Prompt：\n${task.prompt?.negative || "无"}`,
          `输出设置：\n比例：${task.constraints?.aspectRatio || "未知"}\n分辨率：${task.constraints?.resolution || "未知"}`,
        ].join("\n\n");

        panel.className = "debug-panel";
        panel.innerHTML = "<summary>调试信息：查看最终 Prompt 和图1/图2对应关系</summary>";
        copyButton.className = "debug-copy-button";
        copyButton.type = "button";
        copyButton.textContent = "复制调试信息";
        copyButton.addEventListener("click", () => {
          messageInput.value = debugText;
          selectedOperationScenarioId = "";
          messageInput.focus();
          resizeMessageInput();
          updateRunState();
        });
        panel.appendChild(copyButton);
        appendDebugSection(panel, "参考图编号", buildReferenceDebugText(task));
        appendDebugSection(panel, "语言模型最终正向 Prompt", task.prompt?.positive);
        appendDebugSection(panel, "语言模型最终负向 Prompt", task.prompt?.negative);
        appendDebugSection(panel, "输出设置", [
          `比例：${task.constraints?.aspectRatio || "未知"}`,
          `分辨率：${task.constraints?.resolution || "未知"}`,
        ].join("\n"));

        return panel;
      }

          }

          const emptyPaletteOption = document.createElement("option");

      async function ensureConversation(signal) {
        if (activeConversationId) {
          return activeConversationId;
        }

        const response = await apiFetch("/api/conversations", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            modelId: modelSelect.value,
            agentId: agentSelect.value,
          }),
          signal,
        });
        const data = await response.json();
        if (!response.ok || !data.conversation) {
          throw new Error(data.error || "创建对话失败");
        }
        activeConversationId = data.conversation.id;
        return activeConversationId;
      }

      async function submitConversationMessage(content, messageAttachments, inputType = "auto", hasRetried = false, signal) {
        const conversationId = await ensureConversation(signal);
        const response = await apiFetch(`/api/conversations/${conversationId}/messages`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            content,
            modelId: modelSelect.value,
            agentId: agentSelect.value,
            inputType,
            selectionAssets: messageAttachments,
            batchSize,
            aspectRatio: resolveAspectRatio(),
            resolution,
            materialPresetIds,
            colorPaletteId,
            shapeArchitectureId,
            operationScenarioId: selectedOperationScenarioId || undefined,
            usePromptOrchestrator: true,
          }),
          signal,
        });
        const data = await response.json();

        if ((response.status === 404 || data.error === "Conversation not found.") && !hasRetried) {
          activeConversationId = null;
          return submitConversationMessage(content, messageAttachments, inputType, true, signal);
        }

        if (!response.ok) {
          throw new Error(data.error || "生成失败");
        }

        return data;
      }

      async function completeScenarioAgentPrompt(content, messageAttachments, signal) {
        const response = await apiFetch("/api/scenario-agent/complete", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            content,
            selectionAssets: messageAttachments,
          }),
          signal,
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "场景智能体生成 Prompt 失败");
        }

        return data;
      }

      function isAbortError(error) {
        return error?.name === "AbortError";
      }

      function stopGeneration() {
        if (activeGenerationController) {
          activeGenerationController.abort();
        }
      }

      async function sendMessage() {
        if (isSending) {
          stopGeneration();
          return;
        }

        const content = messageInput.value.trim();

        if (!content && !selectedAssets.length) {
          return;
        }

        const hasConfig = Boolean(
          agentSelect.value
          || colorPaletteId
          || shapeArchitectureId
          || materialPresetIds.length
          || selectedOperationScenarioId
        );
        if (!content && selectedAssets.length && !hasConfig) {
          const hint = "请描述要怎么处理这张图，或选择一个风格/形状/配色/材质。";
          selectionStatus.textContent = hint;
          addMessage("system", hint);
          updateRunState();
          return;
        }

        const highestReferencedImageIndex = getHighestReferencedImageIndex(content);
        if (highestReferencedImageIndex > selectedAssets.length) {
          addMessage("system", `你提到了图${highestReferencedImageIndex}，但当前只添加了 ${selectedAssets.length} 张参考图。请先点击“添加选中图”把图${highestReferencedImageIndex}加进来。`);
          return;
        }

        const scenarioAgent = getScenarioAgentFromContent(content);
        const messageAttachments = getLabeledSelectedAssets();

        if (scenarioAgent) {
          const generationController = new AbortController();
          activeGenerationController = generationController;
          isSending = true;
          clearStyleSelectionsForScenarioAgent();
          updateRunState();
          const pending = addMessage("system", `正在调用「${scenarioAgent.name}」补全 Prompt...`);

          try {
            const data = await completeScenarioAgentPrompt(content, messageAttachments, generationController.signal);
            messageInput.value = data.prompt;
            resizeMessageInput();
            pending.textContent = data.promptNegative
              ? `「${scenarioAgent.name}」已生成 Prompt，已回填正向 Prompt。负面提示词供调试参考：${data.promptNegative}`
              : `「${scenarioAgent.name}」已生成 Prompt，已回填到输入框。你可以继续修改，确认后再点击生成。`;
            selectionStatus.textContent = "场景智能体已补全 Prompt；普通风格套装和自由搭配已清空。";
          } catch (error) {
            pending.textContent = isAbortError(error)
              ? "已暂停场景智能体补全。"
              : error.message;
          } finally {
            isSending = false;
            if (activeGenerationController === generationController) {
              activeGenerationController = null;
            }
            updateRunState();
          }
          return;
        }

        const loadingText = "正在渲染一种‘甲方闭嘴’的高级感...";
        let renderTimer;
        const generationController = new AbortController();
        activeGenerationController = generationController;
        isSending = true;
        updateRunState();
        const inputType = await inferInputType(messageAttachments, content);
        if (generationController.signal.aborted) {
          isSending = false;
          activeGenerationController = null;
          updateRunState();
          return;
        }

        if (content || messageAttachments.length) {
          addMessage("user", content, messageAttachments);
        }
        messageInput.value = "";
        resizeMessageInput();
        const pending = addMessage("system", `${loadingText} 已用 0 秒`);
        const startedAt = Date.now();

        renderTimer = window.setInterval(() => {
          const elapsedSeconds = Math.floor((Date.now() - startedAt) / 1000);
          pending.textContent = `${loadingText} 已用 ${elapsedSeconds} 秒`;
        }, 1000);

        try {
          const data = await submitConversationMessage(content, messageAttachments, inputType, false, generationController.signal);
          pending.textContent = data.conversation.messages.at(-1).content;
          activeConversationId = data.conversation.id;
          renderResults(data.task);
          clearSelectionsAfterGeneration();
        } catch (error) {
          pending.textContent = isAbortError(error)
            ? "已暂停本次生成。"
            : error.message;
        } finally {
          window.clearInterval(renderTimer);
          selectedOperationScenarioId = "";
          isSending = false;
          if (activeGenerationController === generationController) {
            activeGenerationController = null;
          }
          updateRunState();
        }
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function setupResizeHandle() {
        let isResizing = false;
        let startX = 0;
        let startY = 0;
        let startWidth = 0;
        let startHeight = 0;

        function postResize(width, height) {
          parent.postMessage({
            pluginMessage: {
              type: "resize-ui",
              width,
              height,
            },
          }, "*");
        }

        function handleMove(event) {
          if (!isResizing) {
            return;
          }

          const width = clamp(startWidth + event.clientX - startX, 320, 1200);
          const height = clamp(startHeight + event.clientY - startY, 520, 1100);
          postResize(width, height);
        }

        function stopResize() {
          isResizing = false;
          document.body.classList.remove("resizing");
          document.removeEventListener("mousemove", handleMove);
          document.removeEventListener("mouseup", stopResize);
        }

        resizeHandle.addEventListener("mousedown", (event) => {
          event.preventDefault();
          isResizing = true;
          document.body.classList.add("resizing");
          startX = event.clientX;
          startY = event.clientY;
          startWidth = window.innerWidth;
          startHeight = window.innerHeight;
          document.addEventListener("mousemove", handleMove);
          document.addEventListener("mouseup", stopResize);
        });

        resizeHandle.addEventListener("dblclick", () => {
          const shouldExpand = window.innerWidth < 680;
          postResize(shouldExpand ? 760 : 320, shouldExpand ? 860 : 780);
        });
      }

          materialPanel.classList.remove("open");
        }

        if (!scenarioPanel.contains(event.target) && event.target !== messageInput) {
          hideScenarioPanel();
        }
      });
      addSelectionButton.addEventListener("click", syncCurrentSelection);
      sendButton.addEventListener("click", sendMessage);
      messageInput.addEventListener("input", () => {
        resizeMessageInput();
        updateRunState();
        renderScenarioSuggestions();
      });
      messageInput.addEventListener("keydown", (event) => {
        if ((event.key === "Enter" || event.key === "Tab") && scenarioPanel.classList.contains("open") && activeScenarioSuggestions[0]) {
          event.preventDefault();
          insertActiveScenarioSuggestion(activeScenarioSuggestions[0]);
          return;
        }

        if (event.key === "Escape" && scenarioPanel.classList.contains("open")) {
          event.preventDefault();
          hideScenarioPanel();
          return;
        }

        if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) {
          sendMessage();
        }
      });
      messageInput.addEventListener("click", renderScenarioSuggestions);
      setupResizeHandle();
      resizeMessageInput();

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;

        if (!message) {
          return;
        }

        if (message.type === "selection-synced") {
          const incomingAssets = message.payload.assets || [];
          selectedAssets = mergeSelectedAssets(message.payload.assets || []);
          updateAspectRatioAutoLabel();
          renderAttachments();
          selectionBar.textContent = selectedAssets.length
            ? `已添加 ${selectedAssets.length} 张参考图，按选择顺序标为图1、图2。可点击缩略图右上角删除。`
            : message.payload.message;
          selectionStatus.textContent = incomingAssets.length
            ? `已添加 ${selectedAssets.length} 张参考图，按选择顺序标为图1、图2。`
            : message.payload.message;
          addSelectionButton.disabled = false;
          updateRunState();
        }

        if (message.type === "selection-error") {
          selectionBar.textContent = message.message;
          selectionStatus.textContent = message.message;
          addSelectionButton.disabled = false;
        }

        if (message.type === "insert-result-finished") {
          const pending = pendingInsertButtons.get(message.requestId);

          if (pending) {
            pending.button.textContent = message.ok ? "已插入" : pending.originalText;
            pending.button.disabled = false;
            pendingInsertButtons.delete(message.requestId);

            if (message.ok) {
              window.setTimeout(() => {
                pending.button.textContent = pending.originalText;
              }, 1200);
            }
          }

          if (!message.ok) {
            addMessage("system", message.message || "插入 Figma 失败。");
          }
        }
      };

      loadConfig()
        .then(updateRunState)
        .catch((error) => {
          addMessage("system", getReadableError(error));
        });
    </script>
  </body>
</html>
