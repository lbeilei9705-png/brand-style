<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        color: #f4f7fb;
        background: #0b0f17;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --select-arrow: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 14 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3.25 5.25L7 8.75L10.75 5.25' stroke='%236b7280' stroke-width='1.25' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #0b0f17;
      }

      button,
      select,
      textarea {
        font: inherit;
      }

      .app {
        position: relative;
        display: grid;
        grid-template-rows: minmax(220px, 1fr) minmax(0, auto);
        height: 100vh;
        background: radial-gradient(circle at 50% 0%, #172238 0%, #0b0f17 48%, #070a0f 100%);
      }

      button,
      select {
        min-height: 20px;
        border: 1px solid #283244;
        background: #121826;
        color: #f4f7fb;
        cursor: pointer;
        font-size: 9px;
        font-weight: 650;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .selection-bar {
        display: none;
      }

      .history-panel {
        position: fixed;
        z-index: 30;
        display: none;
        pointer-events: none;
        width: min(360px, calc(100vw - 24px));
        max-height: 220px;
        overflow: auto;
        border: 1px solid #283244;
        border-radius: 20px;
        background: #101624;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
      }

      .history-panel.open {
        display: block;
        pointer-events: auto;
      }

      .history-item {
        width: 100%;
        min-height: auto;
        border: 0;
        border-bottom: 1px solid #202a3a;
        border-radius: 20px;
        padding: 12px 14px;
        background: transparent;
        color: #e5e7eb;
        text-align: left;
      }

      .chat {
        display: grid;
        gap: 12px;
        align-content: start;
        min-height: 0;
        overflow: auto;
        padding: 16px 14px 12px;
        background: transparent;
      }

      .message {
        display: grid;
        gap: 8px;
        max-width: 94%;
        border: 1px solid #24324a;
        border-radius: 20px;
        padding: 14px 16px;
        background: #111827;
        color: #dbeafe;
        font-size: 12px;
        font-weight: 620;
        line-height: 1.7;
      }

      .message-content {
        white-space: pre-wrap;
      }

      .message-attachments {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .message-attachment {
        position: relative;
        width: 52px;
        height: 52px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.32);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.28);
      }

      .message-attachment img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .message-attachment-label {
        position: absolute;
        left: 4px;
        bottom: 4px;
        border-radius: 999px;
        padding: 1px 5px;
        background: rgba(2, 6, 23, 0.72);
        color: #ffffff;
        font-size: 9px;
        font-weight: 700;
        line-height: 1.4;
      }

      .message.user {
        justify-self: end;
        border-color: #2f6fed;
        background: linear-gradient(135deg, #1d4ed8, #2563eb);
        color: #ffffff;
      }

      .reuse-message-button {
        justify-self: end;
        position: relative;
        width: 20px;
        height: 20px;
        border: 0;
        border-radius: 6px;
        padding: 0;
        background: transparent;
        color: rgba(255, 255, 255, 0.78);
      }

      .reuse-message-button:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
      }

      .reuse-message-button::before,
      .reuse-message-button::after {
        position: absolute;
        width: 8px;
        height: 10px;
        border: 1.4px solid currentColor;
        border-radius: 2px;
        content: "";
      }

      .reuse-message-button::before {
        top: 4px;
        left: 5px;
        opacity: 0.55;
      }

      .reuse-message-button::after {
        top: 6px;
        left: 8px;
        background: #2563eb;
      }

      .message.system {
        max-width: 100%;
        border-color: #202a3a;
        background: rgba(17, 24, 39, 0.72);
        color: #9ca3af;
        font-weight: 500;
      }

      .results {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .result-card {
        overflow: hidden;
        border: 1px solid #283244;
        border-radius: 20px;
        background: #0f172a;
      }

      .result-card img {
        display: block;
        width: 100%;
        cursor: grab;
      }

      .result-card img:active {
        cursor: grabbing;
      }

      .result-card div {
        display: grid;
        gap: 6px;
        padding: 8px;
      }

      .result-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .debug-panel {
        border: 1px solid #283244;
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.72);
        color: #cbd5e1;
        font-size: 10px;
        line-height: 1.6;
      }

      .debug-panel summary {
        cursor: pointer;
        padding: 8px 10px;
        color: #e5e7eb;
        font-weight: 700;
      }

      .debug-copy-button {
        margin: 0 10px 8px;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 10px;
        background: #182235;
        color: #bfdbfe;
      }

      .debug-section {
        display: grid;
        gap: 4px;
        border-top: 1px solid #283244;
        padding: 8px 10px;
      }

      .debug-section strong {
        color: #93c5fd;
      }

      .debug-section pre {
        max-height: 180px;
        overflow: auto;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #e5e7eb;
        font-family: inherit;
      }

      .agent-console {
        display: grid;
        gap: 10px;
        min-width: 0;
        max-height: calc(100vh - 220px);
        overflow-y: auto;
        padding: clamp(8px, 1.8vw, 12px);
        border-top: 1px solid #161e2c;
        background: rgba(7, 10, 15, 0.96);
      }

      .control-strip {
        position: relative;
        z-index: 2;
        display: grid;
        width: 100%;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        overflow: visible;
        gap: 5px 8px;
      }

      .control-section-label {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 6px;
        justify-content: flex-start;
        min-width: 0;
        padding: 0 4px;
        color: #94a3b8;
        font-size: 9px;
        font-weight: 700;
        line-height: 1.4;
      }

      .tooltip-trigger {
        position: relative;
        display: inline-grid;
        place-items: center;
        flex: 0 0 auto;
        width: 14px;
        height: 14px;
        border: 1px solid #334155;
        border-radius: 999px;
        color: #94a3b8;
        font-size: 9px;
        font-weight: 700;
        cursor: help;
      }

      .tooltip-trigger::before,
      .tooltip-trigger::after {
        position: absolute;
        z-index: 40;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.12s ease, transform 0.12s ease;
      }

      .tooltip-trigger::before {
        left: 10px;
        top: calc(100% - 2px);
        width: 18px;
        height: 14px;
        background-image: url("data:image/svg+xml,%3Csvg width='18' height='14' viewBox='0 0 18 14' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 14H18L3.4 0.6C2.1 -0.6 0 0.3 0 2.1V14Z' fill='%23111827'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-size: 18px 14px;
        content: "";
        transform: translateY(-3px);
      }

      .tooltip-trigger::after {
        left: 0;
        top: calc(100% + 7px);
        width: min(218px, calc(100vw - 28px));
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 8px 10px;
        background: #111827;
        color: #f8fafc;
        content: attr(data-tooltip);
        font-size: 10px;
        font-weight: 600;
        line-height: 1.5;
        transform: translateY(-3px);
        white-space: normal;
      }

      .tooltip-trigger:hover::before,
      .tooltip-trigger:focus-visible::before {
        opacity: 1;
        transform: translateY(0);
      }

      .tooltip-trigger:hover::after,
      .tooltip-trigger:focus-visible::after {
        opacity: 1;
        transform: translateY(0);
      }

      .control-select,
      .icon-button {
        min-height: 27px;
        border-radius: 20px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      }

      .control-select {
        width: 100%;
        min-width: 0;
        padding: 0 32px 0 14px;
        appearance: none;
        -webkit-appearance: none;
        background-image: var(--select-arrow);
        background-position: right 12px center;
        background-repeat: no-repeat;
        background-size: 14px 14px;
        pointer-events: auto;
      }

      #agent-select {
        grid-column: 1 / -1;
        min-width: 120px;
      }

      .icon-button {
        display: grid;
        place-items: center;
        padding: 0;
        font-size: 9px;
      }

      .composer-card {
        position: relative;
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: 0;
        overflow: hidden;
        padding-top: clamp(18px, 4vh, 29px);
        padding-bottom: clamp(18px, 4vh, 29px);
        border: 1px solid #283244;
        border-radius: 20px;
        background: #111827;
      }

      .attachment-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 18px 24px 0;
      }

      .selection-tools {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 24px 0;
      }

      .add-selection-button {
        min-height: 28px;
        border-radius: 999px;
        padding: 0 12px;
        background: #182235;
        color: #e5e7eb;
        white-space: nowrap;
      }

      .selection-status {
        min-width: 0;
        overflow: hidden;
        color: #64748b;
        font-size: 10px;
        font-weight: 600;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .attachment-row:empty {
        display: none;
      }

      .thumb {
        position: relative;
        width: 46px;
        height: 46px;
        overflow: hidden;
        border: 1px solid #334155;
        border-radius: 20px;
        background: #0b1220;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
      }

      .thumb img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .thumb-label {
        position: absolute;
        left: 3px;
        bottom: 3px;
        border-radius: 999px;
        padding: 1px 5px;
        background: rgba(2, 6, 23, 0.72);
        color: #ffffff;
        font-size: 9px;
        font-weight: 700;
        line-height: 1.4;
      }

      .thumb button {
        position: absolute;
        top: 2px;
        right: 2px;
        display: none;
        width: 18px;
        min-width: 18px;
        height: 18px;
        min-height: 18px;
        border: 0;
        border-radius: 20px;
        padding: 0;
        background: rgba(0, 0, 0, 0.72);
        color: #ffffff;
        font-size: 18px;
        line-height: 1;
      }

      .thumb:hover button {
        display: block;
      }

      textarea {
        width: 100%;
        flex: 0 0 auto;
        height: 128px;
        min-height: 128px;
        max-height: clamp(160px, 30vh, 260px);
        overflow-y: hidden;
        resize: none;
        border: 0;
        outline: 0;
        padding: 9px 12px;
        background: transparent;
        color: #f8fafc;
        font-size: 12px;
      }

      textarea::placeholder {
        color: #64748b;
      }

      .scenario-panel {
        position: absolute;
        right: 14px;
        bottom: 82px;
        left: 14px;
        z-index: 18;
        display: none;
        max-height: 180px;
        overflow: auto;
        border: 1px solid #334155;
        border-radius: 20px;
        padding: 6px;
        background: #1f2937;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.36);
      }

      .scenario-panel.open {
        display: grid;
        gap: 4px;
      }

      .scenario-option {
        display: grid;
        gap: 2px;
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 8px 10px;
        background: transparent;
        color: #f8fafc;
        text-align: left;
      }

      .scenario-option:hover,
      .scenario-option.active {
        background: #111827;
      }

      .scenario-option span {
        color: #94a3b8;
        font-size: 10px;
        font-weight: 500;
      }

      .composer-footer {
        display: grid;
        grid-template-columns: minmax(56px, 72px) minmax(60px, 82px) minmax(104px, 1fr) 34px minmax(76px, 1fr);
        flex: 0 0 auto;
        align-items: center;
        overflow: visible;
        gap: 6px;
        width: 100%;
        min-width: 0;
        padding: 0 10px;
      }

      .pill-select {
        min-height: 24px;
        border-radius: 16px;
        background: #0b1220;
      }

      .pill-select {
        width: 100%;
        min-width: 0;
        padding: 0 32px 0 12px;
        appearance: none;
        -webkit-appearance: none;
        background-image: var(--select-arrow);
        background-position: right 12px center;
        background-repeat: no-repeat;
        background-size: 14px 14px;
        text-align: center;
      }

      #new-chat-button {
        font-size: 13px;
      }

      #color-palette-select {
        width: 100%;
        min-width: 0;
      }

      .palette-select-wrap {
        position: relative;
        min-width: 0;
      }

      #model-select {
        width: 100%;
        min-width: 0;
      }

      .multi-select-wrap {
        position: relative;
        min-width: 0;
      }

      .multi-select-button {
        width: 100%;
        min-width: 0;
        min-height: 26px;
        border-radius: 20px;
        padding: 0 32px 0 14px;
        background: #0b1220;
        background-image: var(--select-arrow);
        background-position: right 12px center;
        background-repeat: no-repeat;
        background-size: 14px 14px;
        font-size: 9px;
        text-align: left;
      }

      .multi-select-panel {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        left: auto;
        z-index: 20;
        display: none;
        width: min(292px, calc(100vw - 20px));
        max-width: calc(100vw - 20px);
        max-height: 360px;
        overflow-x: hidden;
        overflow-y: auto;
        border: 1px solid #334155;
        border-radius: 20px;
        padding: 8px;
        background: #1f2937;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
      }

      .multi-select-panel.open {
        display: grid;
        gap: 4px;
      }

      .multi-select-panel-header {
        display: flex;
        justify-content: flex-start;
        padding: 0 8px 4px;
      }

      .multi-select-clear-button {
        min-height: 22px;
        border: 1px solid #475569;
        border-radius: 999px;
        padding: 0 10px;
        background: #111827;
        color: #cbd5e1;
        font-size: 10px;
        font-weight: 700;
        cursor: pointer;
      }

      .multi-select-clear-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .material-option {
        position: relative;
        display: grid;
        gap: 6px;
        min-height: 118px;
        overflow: hidden;
        border: 1px solid transparent;
        border-radius: 16px;
        padding: 8px;
        color: #f8fafc;
        background: rgba(15, 23, 42, 0.48);
        font-size: 11px;
        cursor: pointer;
        white-space: normal;
      }

      .material-option:hover {
        background: #111827;
      }

      .material-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .material-option span {
        min-width: 0;
        overflow: hidden;
        line-height: 1.35;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .material-option.selected {
        border-color: #1d1d1f;
        box-shadow: 0 0 0 2px rgba(29, 29, 31, 0.12);
      }

      .material-option.selected::before {
        position: absolute;
        top: 8px;
        left: 8px;
        display: grid;
        place-items: center;
        width: 24px;
        height: 24px;
        border-radius: 8px;
        background: #1d1d1f;
        color: #ffffff;
        content: "✓";
        font-size: 15px;
        font-weight: 800;
        line-height: 1;
      }

      .material-preview {
        display: grid;
        place-items: center;
        width: 100%;
        aspect-ratio: 1;
        overflow: hidden;
        border-radius: 14px;
        background: #f5f5f7;
      }

      .material-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .material-preview-fallback {
        width: 66%;
        height: 66%;
        border-radius: 999px;
        background: var(--material-preview-color, #d7dce2);
        box-shadow: inset -14px -16px 24px rgba(0, 0, 0, 0.16), inset 10px 10px 18px rgba(255, 255, 255, 0.68), 0 12px 24px rgba(15, 23, 42, 0.18);
      }

      .quantity-label {
        color: #94a3b8;
        font-size: 9px;
        font-weight: 650;
      }

      .run-button {
        width: 100%;
        min-width: 0;
        min-height: 24px;
        border: 0;
        border-radius: 16px;
        background: #1f2937;
        color: #64748b;
        font-size: 9px;
      }

      .run-button:not(:disabled) {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: #ffffff;
      }

      .resize-handle {
        position: fixed;
        right: 10px;
        bottom: 10px;
        z-index: 10;
        width: 22px;
        min-width: 22px;
        height: 22px;
        min-height: 22px;
        border: 0;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.92);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.32);
        cursor: nwse-resize;
        opacity: 0.8;
      }

      .resize-handle::before,
      .resize-handle::after {
        content: "";
        position: absolute;
        right: 6px;
        bottom: 7px;
        width: 8px;
        height: 2px;
        border-radius: 20px;
        background: #94a3b8;
        transform: rotate(-45deg);
        transform-origin: right center;
      }

      .resize-handle::after {
        right: 6px;
        bottom: 10px;
        width: 5px;
      }

      .resize-handle:hover {
        opacity: 1;
      }

      .collapse-button {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 40;
        display: grid;
        place-items: center;
        width: 26px;
        min-width: 26px;
        height: 26px;
        min-height: 26px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        padding: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04)),
          rgba(15, 23, 42, 0.72);
        color: rgba(226, 232, 240, 0.78);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 10px 28px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(14px);
      }

      .collapse-button::before {
        content: "";
        width: 9px;
        height: 1.6px;
        border-radius: 999px;
        background: currentColor;
      }

      .collapse-button::after {
        content: "";
        position: absolute;
        inset: 7px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.04);
        opacity: 0;
        transition: opacity 140ms ease;
      }

      .collapse-button:hover {
        border-color: rgba(255, 255, 255, 0.22);
        color: #f8fafc;
        transform: translateY(-1px);
      }

      .collapse-button:hover::after {
        opacity: 1;
      }

      body.is-collapsed {
        overflow: hidden;
        background: transparent;
      }

      body.is-collapsed .app {
        display: grid;
        place-items: center;
        width: 100vw;
        height: 100vh;
        background: transparent;
      }

      body.is-collapsed .chat,
      body.is-collapsed .selection-bar,
      body.is-collapsed .agent-console,
      body.is-collapsed .resize-handle {
        display: none;
      }

      body.is-collapsed .collapse-button {
        position: fixed;
        top: 76px;
        left: 50%;
        right: auto;
        width: 46px;
        min-width: 46px;
        height: 46px;
        min-height: 46px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background:
          radial-gradient(circle at 32% 22%, rgba(255, 255, 255, 0.18), transparent 34%),
          linear-gradient(145deg, #111827, #0b0f17);
        color: #f8fafc;
        transform: translate(-50%, -50%);
      }

      body.is-collapsed .collapse-button::before {
        content: "B";
        display: grid;
        place-items: center;
        width: auto;
        height: auto;
        background: transparent;
        color: currentColor;
        font-size: 15px;
        font-weight: 850;
        letter-spacing: -0.04em;
        position: relative;
        z-index: 1;
      }

      body.is-collapsed .collapse-button::after {
        inset: 8px;
      }

      body.resizing {
        cursor: nwse-resize;
        user-select: none;
      }

      @media (max-width: 520px) {
        .chat {
          gap: 10px;
          padding: 44px 10px 10px;
        }

        .message {
          max-width: 100%;
          padding: 12px 13px;
        }

        .agent-console {
          padding: 8px;
        }

        .results {
          grid-template-columns: 1fr;
        }

        .control-strip {

      function authHeaders(extraHeaders = {}) {

      function apiFetch(path, options = {}) {
        return fetch(`${apiBase}${path}`, {

          headers: authHeaders(options.headers || {}),
        });
      }

      function getImageExtension(imageUrl) {
        const dataUrlMatch = imageUrl.match(/^data:image\/([^;]+)/);

        if (dataUrlMatch) {
          return dataUrlMatch[1].replace("jpeg", "jpg").replace("svg+xml", "svg");
        }

        try {
          const extension = new URL(imageUrl).pathname.split(".").pop();

          if (extension && extension.length <= 5) {
            return extension.toLowerCase();
          }
        } catch {
          // Ignore malformed URLs and fall back to PNG.
        }

        return "png";
      }

      function downloadBlobUrl(blobUrl, filename) {
        const link = document.createElement("a");
        link.href = blobUrl;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      async function downloadOriginalImage(result) {
        const extension = getImageExtension(result.imageUrl);
        const sizePart = result.width && result.height ? `-${result.width}x${result.height}` : "";
        const filename = `brand-style-${resolution}-image-${result.rank}${sizePart}.${extension}`;

        if (result.imageUrl.startsWith("data:")) {
          downloadBlobUrl(result.imageUrl, filename);
          return;
        }

        try {
          const response = await fetch(result.imageUrl);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const blob = await response.blob();
          const blobUrl = URL.createObjectURL(blob);
          downloadBlobUrl(blobUrl, filename);
          window.setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
        } catch {
          window.open(result.imageUrl, "_blank");
        }
      }

      function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("读取图片失败。"));
          reader.readAsDataURL(blob);
        });
      }

      function loadImageElement(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("图片加载失败，无法插入 Figma。"));
          image.src = src;
        });
      }

      async function normalizeImageForFigma(dataUrl) {
        const figmaSupportedDataUrl = /^data:image\/(?:png|jpe?g|gif);base64,/i.test(dataUrl);
        const image = await loadImageElement(dataUrl);
        const width = Math.max(1, image.naturalWidth || image.width || 1);
        const height = Math.max(1, image.naturalHeight || image.height || 1);
        const maxFigmaSide = 4096;
        const scale = Math.min(1, maxFigmaSide / Math.max(width, height));
        const needsCanvas = !figmaSupportedDataUrl || scale < 1;

        if (!needsCanvas) {
          return { imageUrl: dataUrl, width, height };
        }

        const canvas = document.createElement("canvas");
        canvas.width = Math.max(1, Math.round(width * scale));
        canvas.height = Math.max(1, Math.round(height * scale));
        const context = canvas.getContext("2d");

        if (!context) {
          throw new Error("无法转换图片格式。");
        }

        context.drawImage(image, 0, 0, canvas.width, canvas.height);

        return {
          imageUrl: canvas.toDataURL("image/png"),
          width: canvas.width,
          height: canvas.height,
        };
      }

      async function prepareImageForFigma(result) {
        let dataUrl = result.imageUrl;

        if (!dataUrl.startsWith("data:")) {
          const response = await fetch(dataUrl);

          if (!response.ok) {
            throw new Error(`下载生成图片失败：HTTP ${response.status}`);
          }

          dataUrl = await blobToDataUrl(await response.blob());
        }

        return normalizeImageForFigma(dataUrl);
      }

      async function insertGeneratedResult(button, result) {
        const originalText = button.textContent;
        const requestId = `insert_${Date.now()}_${Math.random().toString(16).slice(2)}`;

        button.disabled = true;
        button.textContent = "插入中...";

        try {
          const prepared = await prepareImageForFigma(result);
          pendingInsertButtons.set(requestId, { button, originalText });
          parent.postMessage({
            pluginMessage: {
              type: "insert-result",
              requestId,
              imageUrl: prepared.imageUrl,
              width: prepared.width || result.width,
              height: prepared.height || result.height,
            },
          }, "*");
        } catch (error) {
          button.disabled = false;
          button.textContent = originalText;
          addMessage("system", getReadableError(error));
        }
      }

      function setupResultDrag(image, result) {
        image.draggable = true;
        image.title = "拖拽到 Figma 画布插入";
        image.addEventListener("dragstart", (event) => {
          if (!event.dataTransfer) {
            return;
          }

          event.dataTransfer.effectAllowed = "copy";
          event.dataTransfer.setData("text/plain", `generated-result-${result.rank}`);
        });
        image.addEventListener("dragend", async (event) => {
          const endedInsidePlugin = event.clientX >= 0
            && event.clientX <= window.innerWidth
            && event.clientY >= 0
            && event.clientY <= window.innerHeight;

          if (endedInsidePlugin) {
            return;
          }

          try {
            const prepared = await prepareImageForFigma(result);
            parent.postMessage({
              pluginDrop: {
                clientX: event.clientX,
                clientY: event.clientY,
                items: [
                  {
                    type: "text/plain",
                    data: `generated-result-${result.rank}`,
                  },
                ],
                dropMetadata: {
                  type: "generated-result",
                  imageUrl: prepared.imageUrl,
                  width: prepared.width || result.width,
                  height: prepared.height || result.height,
                },
              },
            }, "*");
          } catch (error) {
            addMessage("system", getReadableError(error));
          }
        });
      }

      function addMessage(role, content, attachments = []) {
        const node = document.createElement("article");

        node.className = `message ${role}`;

        if (attachments.length) {
          const attachmentNode = document.createElement("div");

      function getReadableError(error) {
        if (error instanceof TypeError && error.message === "Failed to fetch") {
          return "无法连接 Brand Style 后端服务，请确认 https://brand-style.fintopia-social-media-ads-tools.tech 可访问，并重新打开插件后重试。";
        }

        return error?.message || "发生未知错误，请稍后重试。";
      }

      function getGreatestCommonDivisor(left, right) {
        let a = Math.abs(left);
        let b = Math.abs(right);

        while (b) {
          const remainder = a % b;
          a = b;
          b = remainder;
        }

        return a || 1;
      }

      function resolveAspectRatio() {
        if (aspectRatio !== "auto") {
          return aspectRatio;
        }

        const primaryAsset = selectedAssets.find((asset) => Number(asset.width) > 0 && Number(asset.height) > 0);
        const width = Math.round(Number(primaryAsset?.width));
        const height = Math.round(Number(primaryAsset?.height));

        if (!width || !height) {
          return "1:1";
        }

        const divisor = getGreatestCommonDivisor(width, height);
        return `${width / divisor}:${height / divisor}`;
      }

      function updateAspectRatioAutoLabel() {
        const autoOption = aspectRatioSelect.querySelector('option[value="auto"]');
        if (!autoOption) {
          return;
        }

        const primaryAsset = selectedAssets.find((asset) => Number(asset.width) > 0 && Number(asset.height) > 0);
        if (!primaryAsset) {
          autoOption.textContent = "自动";
          return;
        }

        const width = Math.round(Number(primaryAsset.width));
        const height = Math.round(Number(primaryAsset.height));
        const divisor = getGreatestCommonDivisor(width, height);
        autoOption.textContent = `自动（${width / divisor}:${height / divisor}）`;
      }

      function getLabeledSelectedAssets() {
        return selectedAssets.map((asset, index) => ({
          ...asset,
          referenceLabel: `图${index + 1}`,
        }));
      }

      function hasLineSketchKeyword(value) {
        return /(线稿|草图|描边|轮廓稿|手绘线|sketch|line|outline|wireframe)/i.test(value || "");
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => resolve(image);
          image.onerror = () => reject(new Error("图片识别失败"));
          image.src = src;
        });
      }

      async function looksLikeLineSketch(asset) {
        if (!asset?.assetDataUrl || !asset.assetDataUrl.startsWith("data:image/")) {
          return false;
        }

        const image = await loadImage(asset.assetDataUrl);
        const maxSide = 96;
        const scale = Math.min(1, maxSide / Math.max(image.naturalWidth || image.width, image.naturalHeight || image.height));
        const width = Math.max(1, Math.round((image.naturalWidth || image.width) * scale));
        const height = Math.max(1, Math.round((image.naturalHeight || image.height) * scale));
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext("2d", { willReadFrequently: true });

        if (!context) {
          return false;
        }

        context.drawImage(image, 0, 0, width, height);
        const pixels = context.getImageData(0, 0, width, height).data;
        let opaquePixels = 0;
        let whitePixels = 0;
        let inkPixels = 0;
        let saturatedPixels = 0;

        for (let index = 0; index < pixels.length; index += 4) {
          const alpha = pixels[index + 3];

          if (alpha < 24) {
            continue;
          }

          const red = pixels[index];
          const green = pixels[index + 1];
          const blue = pixels[index + 2];
          const max = Math.max(red, green, blue);
          const min = Math.min(red, green, blue);
          const luma = 0.2126 * red + 0.7152 * green + 0.0722 * blue;
          const saturation = max ? (max - min) / max : 0;
          opaquePixels += 1;

          if (luma > 244 && saturation < 0.1) {
            whitePixels += 1;
            continue;
          }

          if (luma < 210) {
            inkPixels += 1;
          }

          if (saturation > 0.24 && luma < 245) {
            saturatedPixels += 1;
          }
        }

        if (!opaquePixels) {
          return false;
        }

        const whiteRatio = whitePixels / opaquePixels;
        const inkRatio = inkPixels / opaquePixels;
        const saturatedRatio = saturatedPixels / opaquePixels;

        return whiteRatio > 0.68 && inkRatio > 0.008 && inkRatio < 0.24 && saturatedRatio < 0.14;
      }

      async function inferInputType(assets, content) {
        if (hasLineSketchKeyword(content)) {
          return "line_sketch";
        }

        const primaryAsset = assets[0];

        if (!primaryAsset) {
          return "auto";
        }

        if (hasLineSketchKeyword(`${primaryAsset.name || ""} ${primaryAsset.filename || ""}`)) {
          return "line_sketch";
        }

        try {
          return await looksLikeLineSketch(primaryAsset) ? "line_sketch" : "auto";
        } catch {
          return "auto";
        }
      }

      function getAssetIdentity(asset) {
        return String(asset.id || `${asset.filename}-${asset.sizeBytes}`).replace(/-\d+$/, "");
      }

      function mergeSelectedAssets(incomingAssets) {
        const merged = [...selectedAssets];

        for (const asset of incomingAssets) {
          const identity = getAssetIdentity(asset);
          const existingIndex = merged.findIndex((item) => getAssetIdentity(item) === identity);

          if (existingIndex >= 0) {
            merged[existingIndex] = {
              ...merged[existingIndex],
              ...asset,
            };
            continue;
          }

          merged.push(asset);
        }

        return merged;
      }

      function renderAttachments() {
        attachmentRow.innerHTML = "";

        for (const [index, asset] of selectedAssets.entries()) {
          const thumb = document.createElement("section");
          const image = document.createElement("img");
          const label = document.createElement("span");
          const removeButton = document.createElement("button");

          thumb.className = "thumb";
          thumb.title = `图${index + 1}：${asset.name || asset.filename}`;
          image.src = asset.assetDataUrl;
          image.alt = `图${index + 1}：${asset.name || asset.filename}`;
          label.className = "thumb-label";
          label.textContent = `图${index + 1}`;
          removeButton.type = "button";
          removeButton.setAttribute("aria-label", "删除图片");
          removeButton.textContent = "×";
          removeButton.addEventListener("click", () => {
            selectedAssets = selectedAssets.filter((item) => getAssetIdentity(item) !== getAssetIdentity(asset));
            updateAspectRatioAutoLabel();
            renderAttachments();
            selectionBar.textContent = selectedAssets.length
              ? `已添加 ${selectedAssets.length} 张参考图`
              : "当前没有参考图。点击画布对象会自动添加缩略图。";
            updateRunState();
          });
          thumb.append(image, label, removeButton);
          attachmentRow.appendChild(thumb);
        }

        updateRunState();
      }

      function updateRunState() {
        if (isSending) {
          sendButton.disabled = false;
          sendButton.textContent = "暂停";
          sendButton.title = "暂停本次生成";
          return;
        }

        const hasText = Boolean(messageInput.value.trim());
        const isScenarioAgentPrompt = Boolean(getScenarioAgentFromContent(messageInput.value));
        const hasConfig = Boolean(
          agentSelect.value
          || colorPaletteId
          || shapeArchitectureId
          || materialPresetIds.length
          || selectedOperationScenarioId
        );
        const hasOnlyImageWithoutDirection = selectedAssets.length > 0 && !hasText && !hasConfig;
        const canRun = hasText || (selectedAssets.length > 0 && !hasOnlyImageWithoutDirection);
        const directionHint = "请描述要怎么处理这张图，或选择一个风格/形状/配色/材质。";
        sendButton.disabled = !canRun;
        sendButton.textContent = canRun ? isScenarioAgentPrompt ? "生成Prompt" : "整活" : "没活";
        sendButton.title = hasOnlyImageWithoutDirection
          ? directionHint
          : canRun
            ? isScenarioAgentPrompt ? "让场景智能体补全 Prompt" : "开始生成"
            : "请输入需求，或添加参考图并选择生成方向。";

        if (hasOnlyImageWithoutDirection) {
          selectionStatus.textContent = directionHint;
        } else if (selectionStatus.textContent === directionHint) {
          selectionStatus.textContent = selectedAssets.length
            ? `已添加 ${selectedAssets.length} 张参考图。`
            : "打开插件不会自动读取选区。";
        }
      }

      function resizeMessageInput() {
        messageInput.style.height = "128px";
        const maxHeight = Number.parseFloat(getComputedStyle(messageInput).maxHeight) || 210;
        const nextHeight = Math.min(messageInput.scrollHeight, maxHeight);
        messageInput.style.height = `${Math.max(128, nextHeight)}px`;
        messageInput.style.overflowY = messageInput.scrollHeight > maxHeight ? "auto" : "hidden";
      }

      function postResize(width, height) {
        parent.postMessage({
          pluginMessage: {
            type: "resize-ui",
            width,
            height,

        }, "*");

      function scrollComposerActionsIntoView() {
        requestAnimationFrame(() => {
          const app = document.querySelector(".app");
          if (!app || !sendButton) {
            return;
          }

          const appRect = app.getBoundingClientRect();
          const buttonRect = sendButton.getBoundingClientRect();
          const bottomPadding = 28;
          const overflow = buttonRect.bottom + bottomPadding - appRect.bottom;

          if (overflow > 0) {
            app.scrollTop += overflow;
          }
        });
      }

      function scheduleInitialComposerActionsScroll() {
        scrollComposerActionsIntoView();
        setTimeout(scrollComposerActionsIntoView, 80);
        setTimeout(scrollComposerActionsIntoView, 240);
        setTimeout(scrollComposerActionsIntoView, 600);
      }

      function updateMaterialButton() {
        if (!materialPresetIds.length) {
          materialSelectButton.textContent = "未选择材质";
          return;
        }

        materialSelectButton.textContent = materialPresetIds.length === 1
          ? materials.find((item) => item.id === materialPresetIds[0])?.name || "材质 1"
          : `材质 ${materialPresetIds.length}`;
      }

      function cancelMaterialPanelAutoClose() {
        if (materialPanelCloseTimer) {
          clearTimeout(materialPanelCloseTimer);
          materialPanelCloseTimer = null;
        }
      }

      function scheduleMaterialPanelAutoClose() {
        cancelMaterialPanelAutoClose();
        materialPanelCloseTimer = setTimeout(() => {
          materialPanel.classList.remove("open");
          materialPanelCloseTimer = null;
        }, 220);
      }

      function openMaterialPanel() {
        if (!materialPresetIds.length) {
          return;
        }

        cancelMaterialPanelAutoClose();
        closePalettePanel();
        materialPanel.classList.add("open");
      }

      function cancelPalettePanelAutoClose() {
        if (palettePanelCloseTimer) {
          clearTimeout(palettePanelCloseTimer);
          palettePanelCloseTimer = null;
        }
      }

      function openPalettePanel() {
        if (!getSelectedColorPalette()) {
          return;
        }

        cancelPalettePanelAutoClose();
        materialPanel.classList.remove("open");
        paletteInlineEditor.classList.add("open");
      }

      function closePalettePanel() {
        cancelPalettePanelAutoClose();
        paletteInlineEditor.classList.remove("open");
      }

      function schedulePalettePanelAutoClose() {
        cancelPalettePanelAutoClose();
        palettePanelCloseTimer = setTimeout(() => {
          if (paletteInlineEditor.contains(document.activeElement)) {
            palettePanelCloseTimer = null;
            return;
          }

          closePalettePanel();
          palettePanelCloseTimer = null;
        }, 220);
      }

      function resolveMaterialPreviewUrl(url) {
        const value = String(url || "").trim();

        if (!value) {
          return "";
        }

        if (/^(https?:|data:|blob:)/i.test(value)) {
          return value;
        }

        return `${apiBase}${value.startsWith("/") ? value : `/${value}`}`;
      }

      function normalizeHexColor(value) {
        const trimmed = String(value || "").trim();
        const withHash = trimmed.startsWith("#") ? trimmed : `#${trimmed}`;
        const shortMatch = withHash.match(/^#([0-9a-fA-F]{3})$/);

        if (shortMatch) {
          return `#${shortMatch[1].split("").map((char) => char + char).join("")}`.toUpperCase();
        }

        return /^#[0-9a-fA-F]{6}$/.test(withHash) ? withHash.toUpperCase() : "";
      }

      function getSelectedColorPalette() {
        return colorPalettes.find((palette) => palette.id === colorPaletteId);
      }

      function getSafePaletteColors(palette) {
        return (palette?.colors || []).map(normalizeHexColor).filter(Boolean);
      }

      function havePaletteColorsChanged(palette) {
        const original = getSafePaletteColors(palette);

        if (!original.length || original.length !== customPaletteColors.length) {
          return Boolean(customPaletteColors.length);
        }

        return original.some((color, index) => color !== customPaletteColors[index]);
      }

      function renderPaletteSwatches() {
        paletteSwatchRow.innerHTML = "";

        for (const color of customPaletteColors) {
          const swatch = document.createElement("span");
          swatch.className = "palette-swatch";
          swatch.title = color;
          swatch.style.background = color;
          paletteSwatchRow.appendChild(swatch);
        }
      }

      function syncCustomPaletteColorsFromRows() {
        customPaletteColors = [...pluginPaletteColorList.querySelectorAll("[data-plugin-palette-color]")]
          .map((input) => normalizeHexColor(input.value))
          .filter(Boolean);
        renderPaletteSwatches();
      }

      function addPluginPaletteColorRow(color = "#D9D9D9") {
        const normalized = normalizeHexColor(color) || "#D9D9D9";
        const row = document.createElement("div");
        row.className = "plugin-palette-color-row";
        row.innerHTML = `
          <input type="color" value="${normalized}" aria-label="选择颜色" />
          <input data-plugin-palette-color type="text" value="${normalized}" placeholder="#D9D9D9" />
          <button class="plugin-palette-color-remove" type="button">删除</button>
        `;
        const colorInput = row.querySelector('input[type="color"]');
        const textInput = row.querySelector("[data-plugin-palette-color]");
        const removeButton = row.querySelector(".plugin-palette-color-remove");
        colorInput.addEventListener("input", () => {
          textInput.value = normalizeHexColor(colorInput.value) || colorInput.value.toUpperCase();
          syncCustomPaletteColorsFromRows();
        });
        textInput.addEventListener("input", () => {
          const nextColor = normalizeHexColor(textInput.value);

          if (nextColor) {
            colorInput.value = nextColor;
          }

          syncCustomPaletteColorsFromRows();
        });
        textInput.addEventListener("blur", () => {
          textInput.value = normalizeHexColor(textInput.value) || normalized;
          colorInput.value = textInput.value;
          syncCustomPaletteColorsFromRows();
        });
        removeButton.addEventListener("click", () => {
          row.remove();
          syncCustomPaletteColorsFromRows();
        });
        pluginPaletteColorList.appendChild(row);
        syncCustomPaletteColorsFromRows();
      }

      function renderPluginPaletteColorRows() {
        pluginPaletteColorList.innerHTML = "";

        for (const color of customPaletteColors.length ? customPaletteColors : ["#D9D9D9"]) {
          addPluginPaletteColorRow(color);
        }
      }

      function renderPaletteInlineEditor({ resetColors = false } = {}) {
        const palette = getSelectedColorPalette();

        if (!palette) {
          paletteInlineEditor.hidden = true;
          paletteInlineEditor.classList.remove("open");
          paletteEditorPanel.hidden = true;
          customPaletteColors = [];
          return;
        }

        if (resetColors || !customPaletteColors.length) {
          customPaletteColors = getSafePaletteColors(palette);
        }

        paletteInlineEditor.hidden = false;
        paletteEditorPanel.hidden = false;
        renderPaletteSwatches();
        renderPluginPaletteColorRows();
      }

      function getCustomColorPalettePayload() {
        const palette = getSelectedColorPalette();

        if (!palette || !havePaletteColorsChanged(palette)) {
          return undefined;
        }

        return {
          name: `${palette.name}（本次微调）`,
          description: "来自插件前台临时调色",
          colors: customPaletteColors,
          prompt: `本次自定义配色：${customPaletteColors.join("、")}。必须将这些颜色作为画面主要可见配色执行。`,
        };
      }

      function renderMaterialPanel() {
        materialPanel.innerHTML = "";
        const header = document.createElement("div");
        header.className = "multi-select-panel-header";
        const clearButton = document.createElement("button");
        clearButton.className = "multi-select-clear-button";
        clearButton.type = "button";
        clearButton.textContent = "取消全部勾选";
        clearButton.disabled = !materialPresetIds.length;
        clearButton.addEventListener("click", (event) => {
          event.stopPropagation();
          materialPresetIds = [];
          renderMaterialPanel();
        });
        header.appendChild(clearButton);
        materialPanel.appendChild(header);

        for (const material of materials) {
          const label = document.createElement("label");
          const isSelected = materialPresetIds.includes(material.id);
          label.className = `material-option${isSelected ? " selected" : ""}`;
          label.title = material.prompt || material.name;
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = material.id;
          checkbox.checked = isSelected;
          checkbox.addEventListener("change", () => {
            materialPresetIds = checkbox.checked
              ? [...materialPresetIds, material.id]
              : materialPresetIds.filter((id) => id !== material.id);
            label.classList.toggle("selected", checkbox.checked);
            updateMaterialButton();
          });
          const preview = document.createElement("div");
          const previewImageUrl = resolveMaterialPreviewUrl(material.previewImageUrl);
          preview.className = "material-preview";

          if (previewImageUrl) {
            const image = document.createElement("img");
            image.src = previewImageUrl;
            image.alt = material.name;
            image.loading = "lazy";
            image.addEventListener("error", () => {
              preview.innerHTML = "";
              const fallback = document.createElement("span");
              fallback.className = "material-preview-fallback";
              fallback.style.setProperty("--material-preview-color", material.previewColor || "#d7dce2");
              preview.appendChild(fallback);
            });
            preview.appendChild(image);
          } else {
            const fallback = document.createElement("span");
            fallback.className = "material-preview-fallback";
            fallback.style.setProperty("--material-preview-color", material.previewColor || "#d7dce2");
            preview.appendChild(fallback);
          }

          const text = document.createElement("span");
          text.textContent = material.name;
          label.append(checkbox, preview, text);
          materialPanel.appendChild(label);
        }

        updateMaterialButton();
      }

      function clearSelectionsAfterGeneration() {
        updateAspectRatioAutoLabel();
        renderAttachments();
        renderMaterialPanel();
        renderScenarioSuggestions();
        selectionBar.textContent = selectedAssets.length

      function clearStyleSelectionsForScenarioAgent() {
        materialPresetIds = [];
        colorPaletteId = "";
        customPaletteColors = [];
        shapeArchitectureId = "";
        selectedOperationScenarioId = "";
        clearScenarioAgentDraft();
        agentSelect.value = "";
        colorPaletteSelect.value = "";
        shapeArchitectureSelect.value = "";
        materialPanel.classList.remove("open");
        closePalettePanel();
        renderPaletteInlineEditor({ resetColors: true });
        renderMaterialPanel();
        updateRunState();
      }

      function getScenarioAgentFromContent(content) {
        const trimmed = content.trim();

        return scenarioAgents.find((agent) => agent.enabled !== false && (
          trimmed === agent.trigger || trimmed.startsWith(`${agent.trigger} `)
        ));
      }

      function normalizeScenarioDraftPrompt(value) {
        return (value || "").replace(/\s+/g, " ").trim();
      }

      function clearScenarioAgentDraft() {
        scenarioAgentDraft = null;

        try {
          sessionStorage.removeItem(scenarioAgentDraftStorageKey);
        } catch {
          // Storage is best-effort; in-memory draft is enough for the current session.
        }
      }

      function saveScenarioAgentDraft(draft) {
        scenarioAgentDraft = draft;

        try {
          sessionStorage.setItem(scenarioAgentDraftStorageKey, JSON.stringify(draft));
        } catch {
          // Ignore storage failures; the in-memory draft still works until the plugin reloads.
        }
      }

      function getScenarioAgentDraftForContent(content) {
        const normalizedContent = normalizeScenarioDraftPrompt(content);

        if (scenarioAgentDraft && !getScenarioAgentFromContent(content)) {
          return scenarioAgentDraft;
        }

        if (scenarioAgentDraft && normalizeScenarioDraftPrompt(scenarioAgentDraft.promptMain) === normalizedContent) {
          return scenarioAgentDraft;
        }

        try {
          const stored = JSON.parse(sessionStorage.getItem(scenarioAgentDraftStorageKey) || "null");

          if (stored && normalizeScenarioDraftPrompt(stored.promptMain) === normalizedContent) {
            scenarioAgentDraft = stored;
            return stored;
          }
        } catch {
          try {
            sessionStorage.removeItem(scenarioAgentDraftStorageKey);
          } catch {
            // Ignore storage cleanup failures.
          }
        }

        return null;
      }

      function getPreferredAspectRatioForScenarioAgent(agent, prompt) {
        const text = `${agent?.trigger || ""}\n${agent?.name || ""}\n${prompt || ""}`;

        if (/单体舞台|4\s*:\s*3/.test(text)) {
          return "4:3";
        }

        if (/微缩世界|3\s*:\s*4/.test(text)) {
          return "3:4";
        }

        return "";
      }

      function buildDirectPromptFromScenarioDraft(content) {
        const draft = getScenarioAgentDraftForContent(content);

        if (!draft) {
          return undefined;
        }

        return {
          positive: [draft.promptFixedPositive, content].filter(Boolean).join("\n\n"),
          negative: draft.promptNegative || "",
          template: "flat_to_3d",
          referencePack: {
            inputAssetId: selectedAssets[0]?.id || "text-only",
            stylePresetId: "",
            styleAnchors: [],
          },
        };
      }

      function getSlashContext() {
        const cursor = messageInput.selectionStart || 0;
        const beforeCursor = messageInput.value.slice(0, cursor);
        const match = beforeCursor.match(/(^|\s)\/([^\s/]*)$/);

        if (!match) {
          return undefined;
        }

        const query = match[2];
        return {
          query,
          start: cursor - query.length - 1,
          end: cursor,
        };
      }

      function getMentionContext() {
        const cursor = messageInput.selectionStart || 0;
        const beforeCursor = messageInput.value.slice(0, cursor);
        const match = beforeCursor.match(/(^|\s)@([^\s@]*)$/);

        if (!match) {
          return undefined;
        }

        const query = match[2];
        return {
          query,
          start: cursor - query.length - 1,
          end: cursor,
        };
      }

      function hideScenarioPanel() {
        scenarioPanel.classList.remove("open");
        scenarioPanel.innerHTML = "";
        activeScenarioSuggestions = [];
      }

      function buildScenarioText(scenario) {
        return scenario.variablePrompt || scenario.content || "";
      }

      function insertScenarioAgentTrigger(agent) {
        const context = getSlashContext();
        const value = messageInput.value;
        const insertText = `${agent.trigger} `;
        clearStyleSelectionsForScenarioAgent();

        if (!context) {
          messageInput.value = value ? `${value}\n${insertText}` : insertText;
          messageInput.focus();
          messageInput.selectionStart = messageInput.selectionEnd = messageInput.value.length;
          hideScenarioPanel();
          resizeMessageInput();
          selectionStatus.textContent = "已选择场景智能体，请继续输入主题后点击“生成Prompt”。";
          updateRunState();
          return;
        }

        const prefix = value.slice(0, context.start);
        const suffix = value.slice(context.end);
        const needsSpace = suffix && !/^\s/.test(suffix) ? " " : "";
        messageInput.value = `${prefix}${insertText}${needsSpace}${suffix}`;
        const cursor = prefix.length + insertText.length;
        messageInput.focus();
        messageInput.selectionStart = messageInput.selectionEnd = cursor;
        hideScenarioPanel();
        resizeMessageInput();
        selectionStatus.textContent = "已选择场景智能体，请继续输入主题后点击“生成Prompt”。";
        updateRunState();
      }

      function insertScenarioContent(scenario) {
        const context = getMentionContext();
        const value = messageInput.value;
        const insertText = buildScenarioText(scenario);
        selectedOperationScenarioId = scenario.id || "";

        if (!context) {
          messageInput.value = value ? `${value}\n${insertText}` : insertText;
          messageInput.focus();
          messageInput.selectionStart = messageInput.selectionEnd = messageInput.value.length;
          hideScenarioPanel();
          resizeMessageInput();
          updateRunState();
          return;
        }

        const prefix = value.slice(0, context.start);
        const suffix = value.slice(context.end);
        const needsSpace = suffix && !/^\s/.test(suffix) ? " " : "";
        messageInput.value = `${prefix}${insertText}${needsSpace}${suffix}`;
        const cursor = prefix.length + insertText.length + needsSpace.length;
        messageInput.focus();
        messageInput.selectionStart = messageInput.selectionEnd = cursor;
        hideScenarioPanel();
        resizeMessageInput();
        updateRunState();
      }

      function insertActiveScenarioSuggestion(suggestion) {
        if (suggestion.type === "scenario-agent") {
          insertScenarioAgentTrigger(suggestion.agent);
          return;
        }

        insertScenarioContent(suggestion.scenario);
      }

      function renderScenarioSuggestions() {
        const slashContext = getSlashContext();
        if (slashContext) {
          const query = slashContext.query.trim().toLowerCase();
          activeScenarioSuggestions = scenarioAgents
            .filter((agent) => agent.enabled !== false)
            .filter((agent) => !query || agent.name.toLowerCase().includes(query) || agent.trigger.toLowerCase().includes(query))
            .slice(0, 8)
            .map((agent) => ({ type: "scenario-agent", agent }));

          scenarioPanel.innerHTML = "";

          if (!activeScenarioSuggestions.length) {
            hideScenarioPanel();
            return;
          }

          for (const [index, suggestion] of activeScenarioSuggestions.entries()) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = `scenario-option${index === 0 ? " active" : ""}`;
            button.innerHTML = `<strong></strong><span></span>`;
            button.querySelector("strong").textContent = suggestion.agent.trigger;
            button.querySelector("span").textContent = suggestion.agent.description;
            button.addEventListener("click", () => insertActiveScenarioSuggestion(suggestion));
            scenarioPanel.appendChild(button);
          }

          scenarioPanel.classList.add("open");
          return;
        }

        const context = getMentionContext();

        if (!context) {
          hideScenarioPanel();
          return;
        }

        const query = context.query.trim().toLowerCase();
        activeScenarioSuggestions = operationScenarios
          .filter((scenario) => !query || scenario.name.toLowerCase().includes(query))
          .slice(0, 8)
          .map((scenario) => ({ type: "operation-scenario", scenario }));

        scenarioPanel.innerHTML = "";

        if (!activeScenarioSuggestions.length) {
          hideScenarioPanel();
          return;
        }

        for (const [index, suggestion] of activeScenarioSuggestions.entries()) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `scenario-option${index === 0 ? " active" : ""}`;
          button.innerHTML = `<strong></strong><span></span>`;
          button.querySelector("strong").textContent = `@${suggestion.scenario.name}`;
          button.querySelector("span").textContent = suggestion.scenario.description || buildScenarioText(suggestion.scenario).slice(0, 36);
          button.addEventListener("click", () => insertActiveScenarioSuggestion(suggestion));
          scenarioPanel.appendChild(button);
        }

        scenarioPanel.classList.add("open");
      }

      function appendDebugSection(parent, title, content) {
        const section = document.createElement("section");
        const heading = document.createElement("strong");
        const body = document.createElement("pre");

        section.className = "debug-section";
        heading.textContent = title;
        body.textContent = content || "无";
        section.append(heading, body);
        parent.appendChild(section);
      }

      function buildReferenceDebugText(task) {
        const references = task.referenceAssets?.length ? task.referenceAssets : task.inputAsset ? [task.inputAsset] : [];

        if (!references.length) {
          return "无参考图";
        }

        return references.map((asset, index) => {
          const label = asset.referenceLabel || `图${index + 1}`;
          const size = asset.width && asset.height ? ` · ${asset.width}x${asset.height}` : "";
          return `${label}：${asset.filename || asset.name || asset.id}${size}`;
        }).join("\n");
      }

      function getHighestReferencedImageIndex(content) {
        const matches = [...content.matchAll(/图\s*(\d+)/g)];

        return matches.reduce((max, match) => Math.max(max, Number(match[1]) || 0), 0);
      }

      function createPromptDebugPanel(task) {
        const panel = document.createElement("details");
        const copyButton = document.createElement("button");
        const debugText = [
          `参考图编号：\n${buildReferenceDebugText(task)}`,
          `语言模型最终正向 Prompt：\n${task.prompt?.positive || "无"}`,
          `语言模型最终负向 Prompt：\n${task.prompt?.negative || "无"}`,
          `输出设置：\n比例：${task.constraints?.aspectRatio || "未知"}\n分辨率：${task.constraints?.resolution || "未知"}`,
        ].join("\n\n");

        panel.className = "debug-panel";
        panel.innerHTML = "<summary>调试信息：查看最终 Prompt 和图1/图2对应关系</summary>";
        copyButton.className = "debug-copy-button";
        copyButton.type = "button";
        copyButton.textContent = "复制调试信息";
        copyButton.addEventListener("click", () => {
          messageInput.value = debugText;
          selectedOperationScenarioId = "";
          messageInput.focus();
          resizeMessageInput();
          updateRunState();
        });
        panel.appendChild(copyButton);
        appendDebugSection(panel, "参考图编号", buildReferenceDebugText(task));
        appendDebugSection(panel, "语言模型最终正向 Prompt", task.prompt?.positive);
        appendDebugSection(panel, "语言模型最终负向 Prompt", task.prompt?.negative);
        appendDebugSection(panel, "输出设置", [
          `比例：${task.constraints?.aspectRatio || "未知"}`,
          `分辨率：${task.constraints?.resolution || "未知"}`,
        ].join("\n"));

        return panel;
      }

      function renderResults(task) {
        const wrapper = document.createElement("article");
        wrapper.className = "message assistant";
        const title = document.createElement("strong");
        title.textContent = `生成完成：${task.results.length} 张图片`;

            <div>
              <strong>图片 ${result.rank}</strong>
              <span>${sizeLabel} · 可拖拽到画布</span>
              <section class="result-actions">
                <button class="insert-result-button" type="button">插入 Figma</button>
                <button class="download-result-button" type="button">下载原图</button>
              </section>
            </div>
