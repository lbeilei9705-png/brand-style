<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt 规则测试台</title>
    <style>
      :root {
        --debug-bg: #0c0c0c;
        --debug-sidebar-bg: #0a0a0a;
        --debug-panel: #111111;
        --debug-panel-hover: #161616;
        --debug-surface-soft: #1a1a1a;
        --debug-text: #f2f2f2;
        --debug-muted: #a3a3a3;
        --debug-subtle: #666666;
        --debug-line: #272727;
        --debug-line-strong: #3a3a3a;
        --debug-accent: #f7f7f7;
        --debug-success-bg: rgba(63, 185, 80, 0.12);
        --debug-success: #3fb950;
        --debug-danger-bg: rgba(248, 81, 73, 0.12);
        --debug-danger: #f85149;
        --debug-warn-bg: rgba(210, 153, 34, 0.14);
        --debug-warn: #d29922;
        color: var(--debug-text);
        background: var(--debug-bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--debug-bg);
        line-height: 1.5;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-columns: 384px minmax(0, 1fr);
        min-height: 100vh;
        background: var(--debug-bg);
      }

      .panel {
        border: 1px solid var(--debug-line);
        border-radius: 14px;
        background: var(--debug-panel);
        box-shadow: none;
      }

      .sidebar {
        position: sticky;
        top: 0;
        display: grid;
        align-content: start;
        gap: 18px;
        height: 100vh;
        overflow: auto;
        border: 0;
        border-right: 1px solid var(--debug-line);
        border-radius: 0;
        padding: 22px 18px;
        background: var(--debug-sidebar-bg);
      }

      .debug-brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-height: 60px;
        border-radius: 12px;
        padding: 12px;
      }

      .debug-mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 1px solid var(--debug-line-strong);
        border-radius: 10px;
        background: var(--debug-accent);
        color: #0c0c0c;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: -0.04em;
        flex: 0 0 auto;
      }

      .main {
        display: grid;
        align-content: start;
        gap: 24px;
        min-width: 0;
        padding: 28px 32px 56px;
      }

      .debug-topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        border: 1px solid var(--debug-line);
        border-radius: 14px;
        padding: 16px 18px;
        background: rgba(17, 17, 17, 0.92);
        backdrop-filter: blur(18px);
      }

      .debug-topbar strong {
        display: block;
        margin-bottom: 2px;
        color: var(--debug-text);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin: 0 0 2px;
        color: var(--debug-text);
        font-size: 14px;
        font-weight: 650;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }

      h2 {
        margin: 0 0 14px;
        color: var(--debug-text);
        font-size: 18px;
        font-weight: 650;
        letter-spacing: -0.03em;
      }

      .muted {
        margin: 0;
        color: var(--debug-muted);
        line-height: 1.5;
        font-size: 13px;
      }

      .field {
        display: grid;
        gap: 10px;
      }

      .field span,
      .checkbox-row {
        color: var(--debug-muted);
        font-size: 12px;
        font-weight: 500;
      }

      select,
      textarea,
      input[type="text"] {
        width: 100%;
        border: 1px solid var(--debug-line);
        border-radius: 9px;
        padding: 12px 13px;
        background: var(--debug-bg);
        color: var(--debug-text);
        outline: none;
        transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
      }

      select:focus,
      textarea:focus,
      input[type="text"]:focus {
        border-color: var(--debug-line-strong);
        background: #0f0f0f;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
      }

      select option {
        color: #18181b;
      }

      select[multiple] option {
        background: var(--debug-bg);
        color: var(--debug-muted);
      }

      select[multiple] option:checked {
        background:
          linear-gradient(var(--debug-surface-soft), var(--debug-surface-soft));
        color: var(--debug-text);
      }

      select[multiple] {
        min-height: 128px;
      }

      textarea {
        min-height: 118px;
        resize: vertical;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .checkbox-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        border: 1px solid var(--debug-line);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.015);
      }

      .checkbox-row input {
        margin-top: 2px;
        accent-color: var(--debug-accent);
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      button {
        min-height: 36px;
        border: 0;
        border-radius: 8px;
        padding: 0 14px;
        background: var(--debug-accent);
        color: #111113;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
      }

      button.secondary {
        border: 1px solid var(--debug-line);
        background: var(--debug-panel-hover);
        color: var(--debug-text);
      }

      button:hover:not(:disabled) {
        transform: none;
        filter: brightness(1.04);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .result-card {
        overflow: auto;
        padding: 22px;
      }

      .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      pre {
        overflow: auto;
        max-height: 360px;
        margin: 0;
        border: 1px solid var(--debug-line);
        border-radius: 12px;
        padding: 14px;
        background: #0a0a0a;
        color: #e5e5e5;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .prompt-box {
        overflow: auto;
        max-height: 360px;
        border: 1px solid var(--debug-line);
        border-radius: 12px;
        padding: 14px;
        background: #0a0a0a;
        color: #e5e5e5;
        font-size: 12px;
        line-height: 1.65;
        white-space: pre-wrap;
      }

      .test-row {
        display: grid;
        grid-template-columns: 190px 1fr 120px;
        gap: 16px;
        align-items: start;
        border-top: 1px solid var(--debug-line);
        padding: 16px 0;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 3px 8px;
        background: var(--debug-success-bg);
        color: var(--debug-success);
        font-size: 11px;
        font-weight: 500;
      }

      .pill::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }

      .pill.fail {
        background: var(--debug-danger-bg);
        color: var(--debug-danger);
      }

      .pill.warn {
        background: var(--debug-warn-bg);
        color: var(--debug-warn);
      }

      .assertions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .error {
        border: 1px solid rgba(248, 81, 73, 0.28);
        border-radius: 12px;
        padding: 12px;
        background: var(--debug-danger-bg);
        color: var(--debug-danger);
        font-size: 13px;
        font-weight: 500;
      }

      ::selection {
        background: rgba(255, 255, 255, 0.18);
        color: var(--debug-text);
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-thumb {
        border: 3px solid transparent;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        background-clip: content-box;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          border: 0;
          height: auto;
          border-bottom: 1px solid var(--debug-line);
        }

        .main {
          padding: 20px;
        }

        .debug-topbar {
          position: static;
          align-items: flex-start;
          flex-direction: column;
        }

        .grid-2,
        .result-grid,
        .test-row {
          grid-template-columns: 1fr;
        }

        .actions,
        .actions button {
          width: 100%;
        }

        .actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="panel sidebar">
        <div class="debug-brand">
          <div class="debug-mark" aria-hidden="true">PR</div>
          <div>
            <h1>Prompt 规则测试台</h1>
            <p class="muted">Prompt test workspace</p>
          </div>
        </div>

        <label class="field">
          <span>测试场景</span>
          <select id="scenario-select"></select>
        </label>

        <label class="field">
          <span>用户输入</span>
          <textarea id="content-input"></textarea>
        </label>

        <div class="grid-2">
          <label class="field">
            <span>模型</span>
            <select id="model-select"></select>
          </label>
          <label class="field">
            <span>输入类型</span>
            <select id="input-type-select">
              <option value="auto">自动</option>
              <option value="flat_icon">扁平图形</option>
              <option value="line_sketch">线稿</option>
              <option value="colored_icon">彩色图标</option>
              <option value="illustration">插画</option>
              <option value="3d_other">其他3D</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span>风格套装</span>
          <select id="agent-select"></select>
        </label>

        <div class="grid-2">
          <label class="field">
            <span>形状</span>
            <select id="shape-select"></select>
          </label>
          <label class="field">
            <span>配色</span>
            <select id="palette-select"></select>
          </label>
        </div>

        <label class="field">
          <span>材质（可多选）</span>
          <select id="material-select" multiple></select>
        </label>

        <div class="grid-2">
          <label class="field">
            <span>@运营场景</span>
            <select id="operation-select"></select>
          </label>
          <label class="field">
            <span>参考图数量</span>
            <select id="reference-count-select">
              <option value="0">0 张</option>
              <option value="1">1 张</option>
              <option value="2">2 张</option>
              <option value="3">3 张</option>
            </select>
          </label>
        </div>

        <label class="checkbox-row">
          <input id="orchestrator-checkbox" type="checkbox" />
          运行语言模型编排（慢一点，更接近真实）
        </label>

        <div class="actions">
          <button id="run-button" type="button">测试当前场景</button>
          <button id="run-all-button" class="secondary" type="button">批量测试</button>
        </div>
      </aside>

      <section class="main">
        <header class="debug-topbar">
          <div>
            <strong>Prompt rule diagnostics</strong>
            <p class="muted">只运行配置解析、prompt 拼装和场景 Skill，不调用真实生图模型。</p>
          </div>
        </header>

        <article class="panel result-card">
          <h2>当前结果</h2>
          <div id="single-result" class="muted">加载配置后，选择场景并点击测试。</div>
        </article>

        <article class="panel result-card">
          <h2>批量结果</h2>
          <div id="batch-result" class="muted">还没有批量测试。</div>
        </article>
      </section>
    </main>

    <script src="/debug-prompt.js"></script>
  </body>
</html>
