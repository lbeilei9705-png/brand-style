<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt 规则测试台</title>
    <style>
      :root {
        color: #101828;
        background: #f4f6fb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 1080px;
        background: #f4f6fb;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .shell {
        display: grid;
        grid-template-columns: 380px minmax(0, 1fr);
        gap: 20px;
        min-height: 100vh;
        padding: 24px;
      }

      .panel {
        border: 1px solid #e4e7ec;
        border-radius: 22px;
        background: #ffffff;
        box-shadow: 0 18px 50px rgba(16, 24, 40, 0.06);
      }

      .sidebar {
        display: grid;
        align-content: start;
        gap: 16px;
        padding: 22px;
      }

      .main {
        display: grid;
        gap: 16px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 8px;
        font-size: 24px;
        letter-spacing: -0.04em;
      }

      h2 {
        margin-bottom: 10px;
        font-size: 18px;
      }

      .muted {
        color: #667085;
        line-height: 1.55;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field span,
      .checkbox-row {
        color: #344054;
        font-size: 13px;
        font-weight: 760;
      }

      select,
      textarea,
      input[type="text"] {
        width: 100%;
        border: 1px solid #d0d5dd;
        border-radius: 12px;
        padding: 10px 12px;
        background: #ffffff;
        color: #101828;
        outline: none;
      }

      select[multiple] {
        min-height: 120px;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 999px;
        padding: 0 16px;
        background: #175cd3;
        color: #ffffff;
        cursor: pointer;
        font-weight: 850;
      }

      button.secondary {
        border: 1px solid #d0d5dd;
        background: #ffffff;
        color: #344054;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .result-card {
        padding: 18px;
      }

      .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      pre {
        overflow: auto;
        max-height: 340px;
        margin: 0;
        border: 1px solid #eaecf0;
        border-radius: 14px;
        padding: 12px;
        background: #101828;
        color: #f8fafc;
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .prompt-box {
        border: 1px solid #eaecf0;
        border-radius: 14px;
        padding: 12px;
        background: #f9fafb;
        color: #101828;
        line-height: 1.65;
        white-space: pre-wrap;
      }

      .test-row {
        display: grid;
        grid-template-columns: 190px 1fr 120px;
        gap: 12px;
        align-items: start;
        border-top: 1px solid #eaecf0;
        padding: 14px 0;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 8px;
        background: #ecfdf3;
        color: #027a48;
        font-size: 12px;
        font-weight: 850;
      }

      .pill.fail {
        background: #fef3f2;
        color: #b42318;
      }

      .pill.warn {
        background: #fffaeb;
        color: #b54708;
      }

      .assertions {
        display: grid;
        gap: 6px;
        margin-top: 10px;
      }

      .error {
        border: 1px solid #fecdca;
        border-radius: 14px;
        padding: 12px;
        background: #fef3f2;
        color: #b42318;
        font-weight: 760;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="panel sidebar">
        <div>
          <h1>Prompt 规则测试台</h1>
          <p class="muted">只运行配置解析、prompt 拼装和场景智能体，不调用真实生图模型。</p>
        </div>

        <label class="field">
          <span>测试场景</span>
          <select id="scenario-select"></select>
        </label>

        <label class="field">
          <span>用户输入</span>
          <textarea id="content-input"></textarea>
        </label>

        <div class="grid-2">
          <label class="field">
            <span>模型</span>
            <select id="model-select"></select>
          </label>
          <label class="field">
            <span>输入类型</span>
            <select id="input-type-select">
              <option value="auto">自动</option>
              <option value="flat_icon">扁平图形</option>
              <option value="line_sketch">线稿</option>
              <option value="colored_icon">彩色图标</option>
              <option value="illustration">插画</option>
              <option value="3d_other">其他3D</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span>风格套装</span>
          <select id="agent-select"></select>
        </label>

        <div class="grid-2">
          <label class="field">
            <span>形状</span>
            <select id="shape-select"></select>
          </label>
          <label class="field">
            <span>配色</span>
            <select id="palette-select"></select>
          </label>
        </div>

        <label class="field">
          <span>材质（可多选）</span>
          <select id="material-select" multiple></select>
        </label>

        <div class="grid-2">
          <label class="field">
            <span>@运营场景</span>
            <select id="operation-select"></select>
          </label>
          <label class="field">
            <span>参考图数量</span>
            <select id="reference-count-select">
              <option value="0">0 张</option>
              <option value="1">1 张</option>
              <option value="2">2 张</option>
              <option value="3">3 张</option>
            </select>
          </label>
        </div>

        <label class="checkbox-row">
          <input id="orchestrator-checkbox" type="checkbox" />
          运行语言模型编排（慢一点，更接近真实）
        </label>

        <div class="actions">
          <button id="run-button" type="button">测试当前场景</button>
          <button id="run-all-button" class="secondary" type="button">批量测试</button>
        </div>
      </aside>

      <section class="main">
        <article class="panel result-card">
          <h2>当前结果</h2>
          <div id="single-result" class="muted">加载配置后，选择场景并点击测试。</div>
        </article>

        <article class="panel result-card">
          <h2>批量结果</h2>
          <div id="batch-result" class="muted">还没有批量测试。</div>
        </article>
      </section>
    </main>

    <script src="/debug-prompt.js"></script>
  </body>
</html>
