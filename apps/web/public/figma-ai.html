<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI</title>
    <style>
      :root {
        color-scheme: dark;
        background: #000;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-width: 320px;
        min-height: 100%;
        margin: 0;
        background: #000;
      }

      body {
        display: flex;
        justify-content: center;
      }

      main {
        width: min(100%, 1440px);
        min-height: 100vh;
        background: #000;
      }

      .figma-page {
        display: block;
        width: 100%;
        height: auto;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <main aria-label="AI 汇报页面">
      <img
        class="figma-page"
        src="./assets/figma-ai-report.png"
        width="1440"
        height="28732"
        alt="AI 汇报页面"
      />
    </main>
  </body>
</html>
