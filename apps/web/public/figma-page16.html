<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>创意视觉定制</title>
    <link rel="stylesheet" href="./assets/shared/ppt-common.css" />
    <style>
      :root {
        color-scheme: dark;
        background: #000;
        font-family:
          "PingFang SC", "PingFangSC", "Noto Sans SC", Inter, ui-sans-serif, system-ui,
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      html, body { min-width: 320px; min-height: 100%; margin: 0; background: #000; }
      body { display: flex; justify-content: center; }

      .page {
        position: relative;
        width: 1440px;
        height: 900px;
        overflow: hidden;
        background: #000;
        color: #fff;
      }

      .dot-bg { position: absolute; width: 902px; height: 559px; overflow: hidden; pointer-events: none; }
      .dot-bg img { position: absolute; top: -5.37px; left: -131.94px; width: 1033.94px; height: 564.69px; max-width: none; }
      .dot-bg-top { top: 0; left: 0; }
      .dot-bg-bottom { right: 0; bottom: 0; transform: rotate(180deg); }

      .ppt-nav {
        position: absolute;
        top: 30px;
        left: 450px;
        z-index: 5;
        display: flex;
        width: 480px;
        height: 33px;
        overflow: hidden;
      }

      .ppt-nav a {
        display: flex;
        flex: 0 0 25%;
        flex-direction: column;
        align-items: center;
        height: 100%;
        color: rgba(255, 255, 255, 0.4);
        font: 400 14px/normal Inter, sans-serif;
        text-align: center;
        text-decoration: none;
      }

      .ppt-nav .active { color: #fff; font-weight: 500; }
      .ppt-nav .spacer { width: 100%; height: 14px; }
      .ppt-nav .indicator { width: 100%; height: 2px; border-radius: 2px; background: #eaff4e; }

      .copy {
        position: absolute;
        top: 140px;
        left: 80px;
        width: 641px;
      }

      .copy h1 {
        margin: 0;
        color: #fff;
        font-size: 60px;
        font-weight: 300;
        letter-spacing: 0.6px;
        line-height: 1.61;
      }

      .copy h2 {
        margin: 0;
        color: #fff;
        font-size: 27px;
        font-weight: 300;
        line-height: 1.74;
      }

      .copy p {
        margin: 96px 0 0;
        color: rgba(255, 255, 255, 0.67);
        font-size: 18px;
        line-height: 1.8;
      }

      .copy .quote {
        margin-top: 26px;
        color: rgba(255, 255, 255, 0.6);
        line-height: 2.31;
      }

      .panel {
        position: absolute;
        top: 110px;
        left: 869px;
        width: 513px;
        height: 800px;
        overflow: hidden;
        border-radius: 12px;
        background: #f5f5f5;
        color: #1d1d1f;
      }

      .preview {
        position: relative;
        height: 400px;
        border-bottom: 1px solid #cecece;
        background: #f5f5f5;
      }

      .image-layer {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 3;
        width: 1440px;
        height: 900px;
        max-width: none;
        object-fit: cover;
        pointer-events: none;
      }

      .controls {
        display: grid;
        gap: 16px;
        padding: 0 16px 20px;
      }

      .label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: #8e8e93;
        font-size: 11px;
      }

      .label img { width: 14px; height: 14px; }
      .field-row { display: flex; gap: 8px; margin-top: 8px; }

      .dropdown {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 32px;
        border: 1px solid #e6e6e6;
        border-radius: 6px;
        padding: 8px 10px;
        background: #fff;
        color: #1d1d1f;
        font-size: 12px;
        flex: 1;
      }

      .dropdown img { width: 12px; height: 12px; }

      .prompt-card {
        position: relative;
        height: 134px;
        border: 1px solid #e6e6e6;
        border-radius: 24px;
        padding: 16px;
        background: #fff;
      }

      .prompt-top {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .add-btn {
        border: 1px solid #e6e6e6;
        border-radius: 100px;
        padding: 6px 12px;
        font-size: 11px;
        font-weight: 700;
      }

      .prompt-top span { color: #8e8e93; font-size: 11px; }
      .thumb {
        width: 65px;
        height: 65px;
        border-radius: 8px;
        object-fit: cover;
      }

      .primary-btn {
        display: grid;
        place-items: center;
        height: 60px;
        border-radius: 100px;
        background: #000;
        color: #fdfdfd;
        font-size: 13px;
        font-weight: 700;
      }

      .footer {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
        padding: 0 80px;
        background: rgba(0, 0, 0, 0.3);
      }

      .footer p { margin: 0; white-space: nowrap; }
      .footer-brand { font-family: Inter, sans-serif; font-size: 20px; }
      .footer-links { display: flex; gap: 40px; color: #999; font-size: 15px; }
    </style>
  </head>
  <body>
    <main class="page" aria-label="创意视觉定制">
      <div class="dot-bg dot-bg-top" aria-hidden="true"><img src="./assets/shared/ppt-bg-dots.png" alt="" /></div>
      <div class="dot-bg dot-bg-bottom" aria-hidden="true"><img src="./assets/shared/ppt-bg-dots.png" alt="" /></div>

      <nav class="ppt-nav" aria-label="PPT 导航">
        <a href="./figma-page3" data-slide-key="target"><span>目标</span><span class="spacer"></span></a>
        <a href="./figma-page7" data-slide-key="solution"><span>方案</span><span class="spacer"></span></a>
        <a class="active" href="./figma-page12" data-slide-key="result"><span>成果</span><span class="spacer"></span><span class="indicator"></span></a>
        <a href="./figma-page2" data-slide-key="roadmap"><span>规划</span><span class="spacer"></span></a>
      </nav>

      <section class="copy">
        <h1>创意视觉定制</h1>
        <h2>草稿一键生成符合标准的素材</h2>
        <p>针对引导页创意插图、运营视觉头图等复杂视觉设计，设计师只需绘制明确的草稿，上传后即可依托插件预置的规则，一键生成多品牌（多国家）版本 3D 效果图，既保留原创设计创意，又实现标准化批量出图。</p>
        <p class="quote">设计师不是少做图，而是定义视觉标准</p>
      </section>

      <section class="panel">
        <div class="preview">
        </div>
        <div class="controls">
          <section>
            <div class="label">自由搭配 <img src="./assets/figma-page16/help.svg" alt="" /></div>
            <div class="field-row">
              <div class="dropdown">未选择形状 <img src="./assets/figma-page16/chevron.svg" alt="" /></div>
              <div class="dropdown">未选择配色 <img src="./assets/figma-page16/chevron.svg" alt="" /></div>
              <div class="dropdown">未选择材质 <img src="./assets/figma-page16/chevron.svg" alt="" /></div>
            </div>
          </section>
          <section>
            <div class="label">风格套装 <img src="./assets/figma-page16/help.svg" alt="" /></div>
            <div class="field-row">
              <div class="dropdown">未选择风格套装 <img src="./assets/figma-page16/chevron.svg" alt="" /></div>
            </div>
          </section>
          <section class="prompt-card">
            <div class="prompt-top">
              <div class="add-btn">添加选中图</div>
              <span>打开插件不会自动读取选区。</span>
            </div>
            <img class="thumb" src="./assets/figma-page16/sketch.png" alt="" />
          </section>
          <div class="primary-btn">一键生成</div>
        </div>
      </section>

      <img class="image-layer" src="./assets/figma-page16/image-layer.png" alt="" />

      <footer class="footer">
        <p class="footer-brand">Brand Style</p>
        <p class="footer-links">
          <span>设计定义标准</span>
          <span>AI执行标准</span>
          <span>系统沉淀资产</span>
          <span>组织获得能力</span>
        </p>
      </footer>
    </main>
  </body>
</html>
