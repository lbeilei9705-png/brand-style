<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MVP生产闭环</title>
    <link rel="stylesheet" href="./assets/shared/ppt-common.css" />
    <style>
      :root {
        color-scheme: dark;
        background: #000;
        font-family:
          "PingFang SC", "PingFangSC", "Noto Sans SC", Inter, ui-sans-serif, system-ui,
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * { box-sizing: border-box; }
      html, body { min-width: 320px; min-height: 100%; margin: 0; background: #000; }
      body { display: flex; justify-content: center; }

      .page {
        position: relative;
        width: 1440px;
        height: 900px;
        overflow: hidden;
        background: #000;
        color: #fff;
      }

      .dot-bg { position: absolute; width: 902px; height: 559px; overflow: hidden; pointer-events: none; }
      .dot-bg img { position: absolute; top: -5.37px; left: -131.94px; width: 1033.94px; height: 564.69px; max-width: none; }
      .dot-bg-top { top: 0; left: 0; }
      .dot-bg-bottom { right: 0; bottom: 0; transform: rotate(180deg); }

      .ppt-nav {
        position: absolute;
        top: 30px;
        left: 480px;
        z-index: 5;
        display: flex;
        width: 480px;
        height: 33px;
        overflow: hidden;
      }

      .ppt-nav a {
        display: flex;
        flex: 0 0 25%;
        flex-direction: column;
        align-items: center;
        height: 100%;
        color: rgba(255, 255, 255, 0.4);
        font: 400 14px/normal Inter, sans-serif;
        text-align: center;
        text-decoration: none;
      }

      .ppt-nav .active { color: #fff; font-weight: 500; }
      .ppt-nav .spacer { width: 100%; height: 14px; }
      .ppt-nav .indicator { width: 100%; height: 2px; border-radius: 2px; background: #eaff4e; }

      .header {
        position: absolute;
        top: 112px;
        left: 80px;
        width: 1280px;
        height: 138px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 24px;
        background: rgba(11, 11, 11, 0.45);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
        text-align: center;
      }

      .header h1 {
        margin: 0;
        font-size: 40px;
        font-weight: 300;
        line-height: 1.2;
      }

      .header p {
        margin: 10px 0 0;
        color: rgba(255, 255, 255, 0.4);
        font-size: 20px;
        line-height: 1.6;
      }

      .loop {
        position: absolute;
        top: 398px;
        left: 50%;
        width: 1280px;
        margin: 0;
        color: #fff;
        font-size: 40px;
        font-weight: 300;
        line-height: 1.74;
        text-align: center;
        transform: translateX(-50%);
        white-space: pre-wrap;
      }

      .loop span {
        color: rgba(255, 255, 255, 0.3);
        padding: 0 12px;
      }

      .desc {
        position: absolute;
        top: 489px;
        left: 50%;
        width: 504px;
        margin: 0;
        color: rgba(255, 255, 255, 0.6);
        font-size: 18px;
        line-height: 2.31;
        text-align: center;
        transform: translateX(-50%);
      }

      .footer {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
        padding: 0 80px;
        background: rgba(0, 0, 0, 0.3);
      }

      .footer p { margin: 0; white-space: nowrap; }
      .footer-brand { font-family: Inter, sans-serif; font-size: 20px; }
      .footer-links { display: flex; gap: 40px; color: #999; font-size: 15px; }
    </style>
  </head>
  <body>
    <main class="page" aria-label="MVP生产闭环">
      <div class="dot-bg dot-bg-top" aria-hidden="true"><img src="./assets/shared/ppt-bg-dots.png" alt="" /></div>
      <div class="dot-bg dot-bg-bottom" aria-hidden="true"><img src="./assets/shared/ppt-bg-dots.png" alt="" /></div>

      <nav class="ppt-nav" aria-label="PPT 导航">
        <a href="./figma-page3" data-slide-key="target"><span>目标</span><span class="spacer"></span></a>
        <a href="./figma-page7" data-slide-key="solution"><span>方案</span><span class="spacer"></span></a>
        <a href="./figma-page12" data-slide-key="result"><span>成果</span><span class="spacer"></span></a>
        <a class="active" href="./figma-page21" data-slide-key="roadmap"><span>规划</span><span class="spacer"></span><span class="indicator"></span></a>
      </nav>

      <section class="header">
        <h1>MVP生产闭环</h1>
        <p>设计团队可配置、可复用、可测试、可沉淀的视觉生产系统</p>
      </section>

      <p class="loop">输入需求 <span>→</span> 生成结果 <span>→</span> 验证效果 <span>→</span> 沉淀经验 <span>→</span> 再次复用</p>
      <p class="desc">这条生产链已经能跑起来，并且每次使用都能反哺下一次生成</p>

      <footer class="footer">
        <p class="footer-brand">Brand Style</p>
        <p class="footer-links">
          <span>设计定义标准</span>
          <span>AI执行标准</span>
          <span>系统沉淀资产</span>
          <span>组织获得能力</span>
        </p>
      </footer>
    </main>
  </body>
</html>
