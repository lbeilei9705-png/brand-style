<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>目标</title>
    <link rel="stylesheet" href="./assets/shared/ppt-common.css" />
    <style>

      .page {
        position: relative;
        width: min(100vw, 1440px);
        aspect-ratio: 1440 / 900;
        overflow: hidden;
        background: #000;
        color: #fff;
      }

      .dot-bg {
        position: absolute;
        width: 62.64%;
        height: 62.11%;
        overflow: hidden;
        pointer-events: none;
      }

      .dot-bg img {
        position: absolute;
        top: -0.96%;
        left: -14.63%;
        width: 114.63%;
        height: 101.02%;
        max-width: none;
      }

      .dot-bg-top {
        top: 0;
        left: 0;
      }

      .dot-bg-bottom {
        right: 0;
        bottom: 0;
        transform: rotate(180deg);
      }

      .ppt-nav {
        position: absolute;
        top: 3.33%;
        left: 31.25%;
        display: flex;
        width: 33.33%;
        height: 3.67%;
        overflow: hidden;
      }

      .ppt-nav a {
        display: flex;
        flex: 0 0 25%;
        flex-direction: column;
        align-items: center;
        height: 100%;
        color: rgba(255, 255, 255, 0.4);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: min(14px, 0.97vw);
        font-weight: 400;
        line-height: normal;
        text-align: center;
        text-decoration: none;
      }

      .ppt-nav .active {
        color: #fff;
        font-weight: 500;
      }

      .ppt-nav .spacer {
        width: 100%;
        height: 42.42%;
      }

      .ppt-nav .indicator {
        width: 100%;
        height: min(2px, 0.14vw);
        border-radius: 2px;
        background: #eaff4e;
      }

      .headline {
        position: absolute;
        top: 19.89%;
        left: 9.31%;
        width: 81.46%;
        margin: 0;
        color: #fff;
        font-size: min(60px, 4.17vw);
        font-weight: 300;
        letter-spacing: min(1.2px, 0.08vw);
        line-height: 1.74;
        text-align: center;
        word-break: break-word;
      }

      .headline p {
        margin: 0;
      }

      .lead {
        position: absolute;
        top: 60.89%;
        left: 30.07%;
        width: 39.93%;
        margin: 0;
        color: rgba(255, 255, 255, 0.6);
        font-size: min(20px, 1.39vw);
        font-weight: 300;
        letter-spacing: min(0.4px, 0.03vw);
        line-height: 1.74;
        text-align: center;
      }

      .details {
        position: absolute;
        top: 66.56%;
        left: 5.63%;
        width: 88.82%;
        margin: 0;
        color: rgba(255, 255, 255, 0.6);
        font-size: min(20px, 1.39vw);
        font-weight: 300;
        letter-spacing: min(0.4px, 0.03vw);
        line-height: 1.74;
        text-align: center;
      }

      .details p {
        margin: 0;
      }

      .details strong {
        color: #fff;
        font-weight: 600;
      }

      .sparkle {
        position: absolute;
        top: 48.11%;
        left: 71.39%;
        width: 4.72%;
        height: 6.11%;
        object-fit: contain;
        pointer-events: none;
      }

      .footer {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 7.11%;
        padding: 0 5.56%;
        background: rgba(0, 0, 0, 0.3);
        color: #fff;
      }

      .footer p {
        margin: 0;
        white-space: nowrap;
      }

      .footer-brand {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: min(20px, 1.39vw);
        font-weight: 400;
      }

      .footer-links {
        display: flex;
        gap: min(40px, 2.78vw);
        align-items: flex-start;
        color: #999;
        font-family: Inter, "PingFang SC", ui-sans-serif, system-ui, sans-serif;
        font-size: min(15px, 1.04vw);
        font-weight: 400;
        line-height: 1.2;
      }
    </style>
  </head>
  <body>
    <main class="page" aria-label="目标">
      <div class="dot-bg dot-bg-top" aria-hidden="true">
        <img src="./assets/shared/ppt-bg-dots.png" alt="" />
      </div>
      <div class="dot-bg dot-bg-bottom" aria-hidden="true">
        <img src="./assets/shared/ppt-bg-dots.png" alt="" />
      </div>

      <nav class="ppt-nav" aria-label="PPT 导航">
        <a class="active" href="./figma-page3" data-slide-key="target">
          <span>目标</span>
          <span class="spacer"></span>
          <span class="indicator"></span>
        </a>
        <a href="./figma-page2" data-slide-key="solution">
          <span>方案</span>
          <span class="spacer"></span>
        </a>
        <a href="./figma-page2" data-slide-key="result">
          <span>成果</span>
          <span class="spacer"></span>
        </a>
        <a href="./figma-page2" data-slide-key="roadmap">
          <span>规划</span>
          <span class="spacer"></span>
        </a>
      </nav>

      <h1 class="headline">
        <p>设计师定义标准</p>
        <p>AI 稳定执行标准</p>
        <p>持续沉淀团队AI视觉资产</p>
      </h1>
      <p class="lead">核心目标不止是生成一张好看的图、不止是一个生图工具</p>
      <div class="details">
        <p>把风格规范、经验、判断、审美等</p>
        <p>封装成团队可以直接调用的 <strong>AI 生产系统</strong></p>
        <p>能够稳定生成符合我们风格规范、业务场景和交付标准的图</p>
      </div>
      <img class="sparkle" src="./assets/figma-page5/star.svg" alt="" />

      <footer class="footer">
        <p class="footer-brand">Brand Style</p>
        <p class="footer-links" aria-label="工作流原则">
          <span>设计定义标准</span>
          <span>AI执行标准</span>
          <span>系统沉淀资产</span>
          <span>组织获得能力</span>
        </p>
      </footer>
    </main>
  </body>
</html>
