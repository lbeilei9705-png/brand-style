<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流程繁琐消耗时间和精力</title>
    <link rel="stylesheet" href="./assets/shared/ppt-common.css" />
    <style>

      .page {
        position: relative;
        width: min(100vw, 1440px);
        aspect-ratio: 1440 / 900;
        overflow: hidden;
        background: #000;
        color: #fff;
      }

      .dot-bg {
        position: absolute;
        width: 62.64%;
        height: 62.11%;
        overflow: hidden;
        pointer-events: none;
      }

      .dot-bg img {
        position: absolute;
        top: -0.96%;
        left: -14.63%;
        width: 114.63%;
        height: 101.02%;
        max-width: none;
      }

      .dot-bg-top {
        top: 0;
        left: 0;
      }

      .dot-bg-bottom {
        right: 0;
        bottom: 0;
        transform: rotate(180deg);
      }

      .ppt-nav {
        position: absolute;
        top: 3.33%;
        left: 31.25%;
        display: flex;
        width: 33.33%;
        height: 3.67%;
        overflow: hidden;
      }

      .ppt-nav a {
        display: flex;
        flex: 0 0 25%;
        flex-direction: column;
        align-items: center;
        height: 100%;
        color: rgba(255, 255, 255, 0.4);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: min(14px, 0.97vw);
        font-weight: 400;
        line-height: normal;
        text-align: center;
        text-decoration: none;
      }

      .ppt-nav .active {
        color: #fff;
        font-weight: 500;
      }

      .ppt-nav .spacer {
        width: 100%;
        height: 42.42%;
      }

      .ppt-nav .indicator {
        width: 100%;
        height: min(2px, 0.14vw);
        border-radius: 2px;
        background: #eaff4e;
      }

      .headline {
        position: absolute;
        top: 44.22%;
        left: 26.67%;
        margin: 0;
        color: #fff;
        font-size: min(60px, 4.17vw);
        font-weight: 300;
        letter-spacing: min(1.2px, 0.08vw);
        line-height: 1.74;
        white-space: nowrap;
        word-break: break-word;
      }

      .accent-dots {
        position: absolute;
        top: 55.22%;
        left: 28.54%;
        display: flex;
        gap: min(56px, 3.89vw);
      }

      .accent-dots span {
        display: block;
        width: min(6px, 0.42vw);
        height: min(6px, 0.42vw);
        border-radius: 50%;
        background: #eaff4e;
      }

      .footer {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 7.11%;
        padding: 0 5.56%;
        background: rgba(0, 0, 0, 0.3);
        color: #fff;
      }

      .footer p {
        margin: 0;
        white-space: nowrap;
      }

      .footer-brand {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: min(20px, 1.39vw);
        font-weight: 400;
      }

      .footer-links {
        display: flex;
        gap: min(40px, 2.78vw);
        align-items: flex-start;
        color: #999;
        font-family: Inter, "PingFang SC", ui-sans-serif, system-ui, sans-serif;
        font-size: min(15px, 1.04vw);
        font-weight: 400;
        line-height: 1.2;
      }
    </style>
  </head>
  <body>
    <main class="page" aria-label="流程繁琐消耗时间和精力">
      <div class="dot-bg dot-bg-top" aria-hidden="true">
        <img src="./assets/shared/ppt-bg-dots.png" alt="" />
      </div>
      <div class="dot-bg dot-bg-bottom" aria-hidden="true">
        <img src="./assets/shared/ppt-bg-dots.png" alt="" />
      </div>

      <nav class="ppt-nav" aria-label="PPT 导航">
        <a class="active" href="./figma-page3" data-slide-key="target">
          <span>目标</span>
          <span class="spacer"></span>
          <span class="indicator"></span>
        </a>
        <a href="./figma-page2" data-slide-key="solution">
          <span>方案</span>
          <span class="spacer"></span>
        </a>
        <a href="./figma-page2" data-slide-key="result">
          <span>成果</span>
          <span class="spacer"></span>
        </a>
        <a href="./figma-page2" data-slide-key="roadmap">
          <span>规划</span>
          <span class="spacer"></span>
        </a>
      </nav>

      <h1 class="headline">流程繁琐消耗时间和精力</h1>
      <div class="accent-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <footer class="footer">
        <p class="footer-brand">Brand Style</p>
        <p class="footer-links" aria-label="工作流原则">
          <span>设计定义标准</span>
          <span>AI执行标准</span>
          <span>系统沉淀资产</span>
          <span>组织获得能力</span>
        </p>
      </footer>
    </main>
  </body>
</html>
