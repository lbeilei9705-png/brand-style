<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q1 - 视觉风格结构化约束</title>
    <link rel="stylesheet" href="./assets/shared/ppt-common.css" />
    <style>

      .page {
        position: relative;
        width: 1440px;
        height: 900px;
        overflow: hidden;
        background: #000;
        color: #fff;
      }

      .dot-bg {
        position: absolute;
        width: 902px;
        height: 559px;
        overflow: hidden;
        pointer-events: none;
      }

      .dot-bg img {
        position: absolute;
        top: -5.37px;
        left: -131.94px;
        width: 1033.94px;
        height: 564.69px;
        max-width: none;
      }

      .dot-bg-top {
        top: 0;
        left: 0;
      }

      .dot-bg-bottom {
        right: 0;
        bottom: 0;
        transform: rotate(180deg);
      }

      .ppt-nav {
        position: absolute;
        top: 30px;
        left: 480px;
        z-index: 5;
        display: flex;
        width: 480px;
        height: 33px;
        overflow: hidden;
      }

      .ppt-nav a {
        display: flex;
        flex: 0 0 25%;
        flex-direction: column;
        align-items: center;
        height: 100%;
        color: rgba(255, 255, 255, 0.4);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: 14px;
        font-weight: 400;
        line-height: normal;
        text-align: center;
        text-decoration: none;
      }

      .ppt-nav .active {
        color: #fff;
        font-weight: 500;
      }

      .ppt-nav .spacer {
        width: 100%;
        height: 14px;
      }

      .ppt-nav .indicator {
        width: 100%;
        height: 2px;
        border-radius: 2px;
        background: #eaff4e;
      }

      .header {
        position: absolute;
        top: 112px;
        left: 80px;
        width: 1280px;
        height: 138px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 24px;
        background: rgba(11, 11, 11, 0.45);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
        text-align: center;
      }

      .header h1 {
        margin: 0;
        color: #fff;
        font-size: 40px;
        font-weight: 300;
        line-height: 1.2;
      }

      .header p {
        margin: 10px 0 0;
        color: rgba(255, 255, 255, 0.4);
        font-size: 20px;
        line-height: 1.6;
      }

      .grid {
        position: absolute;
        top: 277px;
        left: 80px;
        width: 1280px;
        height: 540px;
      }

      .row {
        display: flex;
        gap: 24px;
      }

      .row + .row {
        margin-top: 24px;
      }

      .card {
        position: relative;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 24px;
        background: #0b0b0b;
        box-shadow: 0 10px 12px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        transition:
          border-color 180ms ease,
          box-shadow 180ms ease,
          transform 180ms ease;
        z-index: 2;
      }

      .card:hover,
      .card:focus,
      .card:focus-visible,
      .card.is-highlighted {
        border-color: #eaff4e;
        box-shadow:
          0 0 0 1px rgba(234, 255, 78, 0.2),
          0 0 28px rgba(234, 255, 78, 0.12),
          0 10px 12px rgba(0, 0, 0, 0.2);
        outline: none;
        transform: translateY(-2px);
      }

      .card-small {
        width: 410.667px;
        height: 234px;
      }

      .card-large {
        width: 628px;
        height: 282px;
      }

      .preview {
        position: relative;
        border-radius: 12px;
        background: #1e1e1e;
        overflow: hidden;
      }

      .preview-small {
        width: 362.667px;
        height: 113px;
      }

      .preview-large {
        width: 580px;
        height: 161px;
      }

      .card h2 {
        margin: 10px 0 0;
        color: #fff;
        font-size: 23px;
        font-weight: 500;
        line-height: normal;
      }

      .card p {
        margin: 10px 0 0;
        color: #d1d5db;
        font-size: 14px;
        line-height: 1.5;
      }

      .image-layer {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 4;
        width: 1440px;
        height: 900px;
        max-width: none;
        object-fit: cover;
        pointer-events: none;
      }

      .footer {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 64px;
        padding: 0 80px;
        background: rgba(0, 0, 0, 0.3);
        color: #fff;
      }

      .footer p {
        margin: 0;
        white-space: nowrap;
      }

      .footer-brand {
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: 20px;
        font-weight: 400;
      }

      .footer-links {
        display: flex;
        gap: 40px;
        align-items: flex-start;
        color: #999;
        font-family: Inter, "PingFang SC", ui-sans-serif, system-ui, sans-serif;
        font-size: 15px;
        font-weight: 400;
        line-height: 1.2;
      }
    </style>
  </head>
  <body>
    <main class="page" aria-label="Q1 - 视觉风格结构化约束">
      <div class="dot-bg dot-bg-top" aria-hidden="true">
        <img src="./assets/shared/ppt-bg-dots.png" alt="" />
      </div>
      <div class="dot-bg dot-bg-bottom" aria-hidden="true">
        <img src="./assets/shared/ppt-bg-dots.png" alt="" />
      </div>

      <nav class="ppt-nav" aria-label="PPT 导航">
        <a href="./figma-page3" data-slide-key="target">
          <span>目标</span>
          <span class="spacer"></span>
        </a>
        <a class="active" href="./figma-page7" data-slide-key="solution">
          <span>方案</span>
          <span class="spacer"></span>
          <span class="indicator"></span>
        </a>
        <a href="./figma-page2" data-slide-key="result">
          <span>成果</span>
          <span class="spacer"></span>
        </a>
        <a href="./figma-page2" data-slide-key="roadmap">
          <span>规划</span>
          <span class="spacer"></span>
        </a>
      </nav>

      <section class="header">
        <h1>视觉风格结构化约束</h1>
        <p>普通 AI 不懂设计标准，也没有迭代记忆</p>
      </section>

      <section class="grid">
        <div class="row">
          <article class="card card-small" tabindex="0">
            <div class="preview preview-small"></div>
            <h2>色彩</h2>
            <p>品牌色彩不统一，视觉识别度降低，品牌感消失</p>
          </article>
          <article class="card card-small" tabindex="0">
            <div class="preview preview-small"></div>
            <h2>材质</h2>
            <p>材质风格混乱，高端与低端共存，品牌质感被稀释</p>
          </article>
          <article class="card card-small" tabindex="0">
            <div class="preview preview-small"></div>
            <h2>造型</h2>
            <p>造型语言不一致，视觉节奏混乱，品牌形象不稳定</p>
          </article>
        </div>
        <div class="row">
          <article class="card card-large" tabindex="0">
            <div class="preview preview-large"></div>
            <h2>光影感</h2>
            <p>光影处理不统一，氛围感不稳定，品牌高级感丧失</p>
          </article>
          <article class="card card-large" tabindex="0">
            <div class="preview preview-large"></div>
            <h2>构图</h2>
            <p>构图规则不明，信息堆叠，品牌视觉语言不清晰</p>
          </article>
        </div>
      </section>

      <img class="image-layer" src="./assets/figma-page9/image-layer.png" alt="" />

      <footer class="footer">
        <p class="footer-brand">Brand Style</p>
        <p class="footer-links" aria-label="工作流原则">
          <span>设计定义标准</span>
          <span>AI执行标准</span>
          <span>系统沉淀资产</span>
          <span>组织获得能力</span>
        </p>
      </footer>
    </main>
  </body>
</html>
